<style>
/* ══════════════════════════════════════════
   plant.ai — Bold Modern Design System
   ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;
  --bg2:#ffffff;
  --t1:#0a0a0a;
  --t2:#3d3d3d;
  --t3:#9a9a9a;
  --t4:#c8c8c8;
  /* Brand greens */
  --gr:#00c96e;
  --gr-d:#00a558;
  --gr-bg:rgba(0,201,110,0.10);
  /* Semantic */
  --am:#ff9500;
  --am-bg:rgba(255,149,0,0.12);
  --rd:#ff3b30;
  --rd-bg:rgba(255,59,48,0.10);
  --bl:#0066ff;
  --bl-bg:rgba(0,102,255,0.10);
  --pu:#8b5cf6;
  --pu-bg:rgba(139,92,246,0.10);
  /* Card gradients */
  --g1:linear-gradient(135deg,#00c96e 0%,#00b4d8 100%);
  --g2:linear-gradient(135deg,#ff6b6b 0%,#ffd93d 100%);
  --g3:linear-gradient(135deg,#8b5cf6 0%,#ec4899 100%);
  --g4:linear-gradient(135deg,#f97316 0%,#eab308 100%);
  --g5:linear-gradient(135deg,#06b6d4 0%,#6366f1 100%);
  --g6:linear-gradient(135deg,#10b981 0%,#3b82f6 100%);
  /* Surfaces */
  --sep:rgba(0,0,0,0.07);
  --sep2:rgba(0,0,0,0.04);
  --sh:0 2px 16px rgba(0,0,0,0.06);
  --sh2:0 8px 40px rgba(0,0,0,0.12);
  /* Fonts */
  --fd:'DM Sans',system-ui,sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top);
  --sab:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--bg);font-family:var(--fb);color:var(--t1);overscroll-behavior:none;-webkit-overflow-scrolling:touch}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg)}

/* ── Utilities ──────────────────────────────── */
.fw7{font-weight:700}.fw8{font-weight:800}
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}.fs14{font-size:14px}.fs16{font-size:16px}
.ci1{color:var(--t1)}.ci2{color:var(--t2)}.ci3{color:var(--t3)}
.cgr{color:var(--gr-d)}.cam{color:var(--am)}.crd{color:var(--rd)}.cbl{color:var(--bl)}.cpu{color:var(--pu)}
.upper{text-transform:uppercase;letter-spacing:.06em}.italic{font-style:italic}
.flex{display:flex}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.ac{align-items:center}.jb{justify-content:space-between}.f1{flex:1}
.tc{text-align:center}.tr{text-align:right}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.fd{font-family:var(--fd)}.fm{font-family:var(--fm)}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pt{flex:1;height:4px;background:var(--sep);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .6s}
.sbt{height:4px;background:var(--sep);border-radius:10px;overflow:hidden;margin-top:6px}
.sbf{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── Page ───────────────────────────────────── */
.page{padding:16px 16px calc(100px + var(--sab));animation:fadeIn .2s ease}

/* ── Header ─────────────────────────────────── */
.hdr{
  background:rgba(245,245,247,0.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--sep);
  padding:calc(12px + var(--sat)) 20px 0;
  position:sticky;top:0;z-index:30;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px}
.logo{font-size:22px;font-weight:800;letter-spacing:-.04em;color:var(--t1);line-height:1}
.logo-dot{color:var(--gr-d)}
.logo-sub{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:.16em;text-transform:uppercase;margin-top:1px}

/* ── Bottom nav ─────────────────────────────── */
.safe-bottom{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom:var(--sab);
  background:rgba(245,245,247,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--sep);
  max-width:430px;margin:0 auto;z-index:28;
}
.nav{display:flex;padding:8px 12px 10px;gap:0}
.nb{
  flex:1;padding:8px 4px 4px;border:none;border-radius:14px;
  cursor:pointer;font-size:10px;font-weight:600;
  background:transparent;color:var(--t3);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;font-family:var(--fb);
  letter-spacing:-.01em;
}
.nb.on{color:var(--t1)}
.nb.on svg{opacity:1}
.nb svg{opacity:.45;transition:all .15s}

/* ── FAB ────────────────────────────────────── */
.fab{
  position:fixed;bottom:calc(76px + var(--sab));right:18px;
  width:50px;height:50px;border-radius:50%;
  background:var(--t1);border:none;cursor:pointer;
  color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.25);
  z-index:25;display:flex;align-items:center;justify-content:center;
  transition:transform .12s,box-shadow .12s;
}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(0,0,0,.2)}

/* ── Cards ──────────────────────────────────── */
.card{
  background:var(--bg2);
  border-radius:20px;
  border:1px solid var(--sep);
  padding:18px;margin-bottom:10px;
  box-shadow:var(--sh);
}
.sl{font-family:var(--fm);font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}
.sl-gr{color:var(--gr-d)}.sl-bl{color:var(--bl)}.sl-am{color:var(--am)}.sl-pu{color:var(--pu)}

/* ── Gradient hero cards ─────────────────────── */
.gcard{
  border-radius:24px;padding:22px 20px;margin-bottom:10px;
  position:relative;overflow:hidden;min-height:140px;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);
}
.gcard-title{font-size:26px;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1.1;max-width:70%}
.gcard-sub{font-size:13px;color:rgba(255,255,255,.75);font-weight:500;margin-top:4px}
.gcard-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.25)}
.gcard-orb{position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.12);pointer-events:none}
.gcard-orb2{position:absolute;right:20px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}

/* ── Plant card ─────────────────────────────── */
.pc{
  background:var(--bg2);
  border-radius:20px;border:1px solid var(--sep);
  padding:14px 16px;margin-bottom:8px;
  box-shadow:var(--sh);
  display:flex;align-items:center;gap:13px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .12s;
}
.pc:active{transform:scale(.98)}
.pc-line{position:absolute;left:0;top:10px;bottom:10px;width:4px;border-radius:0 3px 3px 0}
.pc-photo{width:52px;height:52px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--bg)}
.pc-photo-em{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#00c96e22,#00b4d822);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pc-info{flex:1;min-width:0}
.pc-name{font-weight:700;font-size:15px;letter-spacing:-.03em;margin-bottom:2px;color:var(--t1)}
.pc-sp{font-size:12px;color:var(--t3);font-style:italic;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── Vitality badge ─────────────────────────── */
.vb{display:inline-flex;align-items:center;gap:5px;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:-.01em}
.vb.lg{font-size:12px;padding:5px 12px}
.vb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vb.lg .vb-dot{width:7px;height:7px}

/* ── Buttons ────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:12px 22px;border-radius:100px;border:none;
  cursor:pointer;font-weight:700;font-size:14px;
  transition:all .14s;gap:7px;font-family:var(--fb);
  letter-spacing:-.02em;
}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--t1);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.btn-s{background:var(--bg2);color:var(--t1);border:1.5px solid var(--sep)}
.btn-w{background:var(--rd-bg);color:var(--rd);border:1.5px solid rgba(255,59,48,.15)}
.btn-g{background:transparent;color:var(--t3);border:none;padding:6px 10px}
.btn-bl{background:var(--bl-bg);color:var(--bl);border:1.5px solid rgba(0,102,255,.15)}
.btn-pu{background:var(--pu-bg);color:var(--pu);border:1.5px solid rgba(139,92,246,.15)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:100px}
.btn-full{width:100%}

/* ── Sheet ──────────────────────────────────── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:flex-end;animation:fadeIn .18s ease;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.sb{
  background:var(--bg2);
  border-radius:28px 28px 0 0;
  padding:0 20px calc(44px + var(--sab));
  width:100%;max-width:430px;margin:0 auto;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -12px 60px rgba(0,0,0,0.15);
  animation:slideUp .26s cubic-bezier(.4,0,.2,1);
  -webkit-overflow-scrolling:touch;
}
.sh{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px}
.sh-title{font-weight:800;font-size:20px;letter-spacing:-.04em;color:var(--t1)}
.sh-close{width:32px;height:32px;border-radius:50%;background:var(--sep2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:background .12s}
.sh-close:active{background:var(--sep)}
.shdr{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:4px 0 16px;z-index:2}
.st{font-weight:800;font-size:24px;letter-spacing:-.04em}

/* ── Toast ──────────────────────────────────── */
.toast{
  position:fixed;top:max(20px,calc(var(--sat) + 12px));left:50%;
  transform:translateX(-50%);
  background:var(--t1);color:#fff;
  padding:10px 22px;border-radius:100px;
  font-weight:700;font-size:13px;letter-spacing:-.02em;
  z-index:200;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.22);
  animation:slideUp .2s ease;pointer-events:none;
}
.toast-w{background:var(--rd)}
.toast-i{background:var(--bl)}

/* ── Alerts ─────────────────────────────────── */
.alert{border-radius:18px;padding:14px 16px;margin-bottom:10px}
.alert-y{background:#fffbeb;border:1.5px solid #fde68a}
.alert-b{background:var(--bl-bg);border:1.5px solid rgba(0,102,255,.15)}
.alert-g{background:var(--gr-bg);border:1.5px solid rgba(0,201,110,.2)}
.alert-pu{background:var(--pu-bg);border:1.5px solid rgba(139,92,246,.15)}
.ar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ar:last-child{margin-bottom:0}

/* ── Info grid ──────────────────────────────── */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:var(--bg);border-radius:14px;padding:12px;border:1px solid var(--sep)}
.ic-l{font-family:var(--fm);font-size:10px;color:var(--t3);font-weight:500;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.ic-v{font-size:13px;font-weight:700;color:var(--t1)}

/* ── Stats ──────────────────────────────────── */
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb2{background:var(--bg2);border-radius:20px;border:1px solid var(--sep);padding:16px;text-align:center;box-shadow:var(--sh)}
.sn{font-weight:800;font-size:24px;line-height:1;letter-spacing:-.04em}

/* ── Hero detail ────────────────────────────── */
.hero{position:relative;overflow:hidden}
.hero-bg{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;opacity:.25;filter:blur(30px)}
.hero-photo{width:76px;height:76px;border-radius:20px;object-fit:cover;flex-shrink:0;border:2px solid var(--sep)}
.hero-photo-em{width:76px;height:76px;border-radius:20px;background:linear-gradient(135deg,#00c96e22,#00b4d822);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Tabs ───────────────────────────────────── */
.tabs{display:flex;background:var(--sep2);border-radius:14px;padding:3px;gap:2px;margin-bottom:16px}
.tab{flex:1;padding:8px 3px;border:none;border-radius:11px;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--t3);transition:all .15s;font-family:var(--fb);letter-spacing:-.01em}
.tab.on{font-weight:700;background:var(--bg2);color:var(--t1);box-shadow:0 1px 6px rgba(0,0,0,.07)}

/* ── Row items ──────────────────────────────── */
.ri{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--sep)}
.ri:last-child{border-bottom:none}

/* ── Pills ──────────────────────────────────── */
.pill{display:inline-block;background:var(--gr-bg);color:var(--gr-d);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:700;margin:0 4px 4px 0}
.quote{font-size:13px;color:var(--t2);border-left:3px solid var(--gr);padding-left:12px;margin-top:10px;line-height:1.6}

/* ── Forms ──────────────────────────────────── */
.fg{margin-bottom:16px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
label{font-family:var(--fm);font-size:10px;font-weight:600;color:var(--t3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--bg);
  border:1.5px solid var(--sep);
  border-radius:14px;padding:13px 14px;
  color:var(--t1);outline:none;font-family:var(--fb);font-size:15px;font-weight:500;
  transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--t1)}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{padding:12px;border:1.5px solid var(--sep);border-radius:14px;background:var(--bg);cursor:pointer;font-weight:600;font-size:13px;font-family:var(--fb);transition:all .15s;text-align:center;color:var(--t1)}
.tbtn.on{border-color:var(--t1);background:var(--t1);color:#fff}
.eg{display:flex;gap:6px;flex-wrap:wrap}
.eb{font-size:20px;width:40px;height:40px;background:var(--bg);border:1.5px solid var(--sep);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eb.on{border-color:var(--t1);background:var(--t1);color:#fff}

/* ── Map ────────────────────────────────────── */
#leaflet-map{width:100%;height:260px;border-radius:18px;overflow:hidden;z-index:1}
.map-card{position:relative}
.wx-card{background:var(--bg2);border-radius:20px;border:1px solid var(--sep);padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh)}

/* ── AI Wizard ──────────────────────────────── */
.wiz-step{animation:fadeIn .2s ease}
.wiz-q{font-weight:800;font-size:20px;letter-spacing:-.04em;margin-bottom:6px;line-height:1.25;color:var(--t1)}
.wiz-sub{font-size:13px;color:var(--t3);margin-bottom:20px;line-height:1.5}
.wiz-opts{display:flex;flex-direction:column;gap:8px}
.wiz-opt{background:var(--bg);border:1.5px solid var(--sep);border-radius:16px;padding:14px 16px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;text-align:left;font-family:var(--fb);display:flex;align-items:center;gap:12px;color:var(--t1);letter-spacing:-.01em}
.wiz-opt:active,.wiz-opt.on{border-color:var(--t1);background:var(--t1);color:#fff}
.wiz-opt:active .wiz-opt-em,.wiz-opt.on .wiz-opt-em{background:rgba(255,255,255,.15)}
.wiz-opt-em{width:38px;height:38px;border-radius:10px;background:var(--sep2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.wiz-progress{display:flex;gap:4px;margin-bottom:24px}
.wiz-dot{flex:1;height:3px;border-radius:2px;background:var(--sep);transition:background .3s}
.wiz-dot.on{background:var(--t1)}
.wiz-loading{text-align:center;padding:40px 20px}
.wiz-loading-em{animation:spin 2s linear infinite;display:inline-block;margin-bottom:16px}
.wiz-result{background:var(--gr-bg);border-radius:16px;padding:16px;margin-bottom:14px;border:1.5px solid rgba(0,201,110,.2)}

/* ── Chat ───────────────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px - var(--sat) - var(--sab));min-height:300px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 0 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.chat-bubble{max-width:82%;padding:12px 16px;border-radius:20px;font-size:14px;line-height:1.55;animation:slideUp .2s ease;letter-spacing:-.01em}
.chat-bubble.ai{background:var(--bg2);border:1px solid var(--sep);border-radius:4px 20px 20px 20px;align-self:flex-start;color:var(--t1);box-shadow:var(--sh)}
.chat-bubble.user{background:var(--t1);color:#fff;border-radius:20px 20px 4px 20px;align-self:flex-end}
.chat-bubble.thinking{background:var(--bg);color:var(--t3);font-style:italic;align-self:flex-start;border-radius:20px}
.chat-input-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--sep)}
.chat-input{flex:1;background:var(--bg);border:1.5px solid var(--sep);border-radius:20px;padding:12px 16px;font-family:var(--fb);font-size:15px;color:var(--t1);outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4;font-weight:500}
.chat-input:focus{border-color:var(--t1)}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--t1);border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.chat-send:active{transform:scale(.9)}
.chat-suggestions{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 2px}
.chat-sug{background:var(--bg);border:1.5px solid var(--sep);border-radius:100px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb);color:var(--t2);transition:all .15s;white-space:nowrap;letter-spacing:-.01em}
.chat-sug:active{background:var(--t1);color:#fff;border-color:var(--t1)}

/* ── Photo upload ───────────────────────────── */
.photo-preview{width:100%;height:160px;object-fit:cover;border-radius:16px;display:block;margin-bottom:10px}
.photo-placeholder{width:100%;height:120px;background:var(--bg);border-radius:16px;border:2px dashed var(--t4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.photo-placeholder:active{background:var(--gr-bg);border-color:var(--gr)}

/* ── AI box ─────────────────────────────────── */
.ai-box{background:var(--pu-bg);border:1.5px solid rgba(139,92,246,.15);border-radius:20px;padding:16px;margin-bottom:20px}
.ai-r{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:10px}
.spark{width:100%;height:44px;overflow:visible}

/* ── Empty state ────────────────────────────── */
.empty{text-align:center;padding:48px 20px}
.empty-em{margin-bottom:16px;opacity:.4}
.empty-t{font-weight:800;font-size:20px;letter-spacing:-.04em;margin-bottom:8px}
.empty-s{font-size:14px;color:var(--t3);margin-bottom:20px}

select option{background:var(--bg2);color:var(--t1)}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4}
::-webkit-scrollbar{width:0}

/* ── Timelapse ──────────────────────────────── */
.tl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-top:12px}
.tl-thumb{position:relative;aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.tl-thumb img{width:100%;height:100%;object-fit:cover}
.tl-thumb .tl-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.55));color:#fff;font-size:9px;font-family:var(--fm);padding:12px 4px 4px;text-align:center}
.tl-thumb.selected{border-color:var(--t1)}
.tl-viewer{position:relative;width:100%;aspect-ratio:4/3;border-radius:18px;overflow:hidden;background:var(--bg);margin-bottom:12px}
.tl-viewer img{width:100%;height:100%;object-fit:contain}
.tl-viewer .tl-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.tl-viewer .tl-nav.prev{left:8px}
.tl-viewer .tl-nav.next{right:8px}
.tl-badge{position:absolute;top:4px;right:4px;width:9px;height:9px;border-radius:50%;background:var(--pu);border:2px solid white}

/* ── Plant picker ───────────────────────────── */
.pp-wrap{position:relative}
.pp-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1.5px solid var(--sep);border-radius:18px;box-shadow:var(--sh2);max-height:220px;overflow-y:auto;z-index:100}
.pp-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:10px}
.pp-item:last-child{border-bottom:none}
.pp-item:active{background:var(--bg)}
.pp-item-em{width:32px;height:32px;border-radius:10px;background:var(--gr-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp-item-info{flex:1;min-width:0}
.pp-item-name{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.pp-item-sp{font-size:11px;color:var(--t3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── AI progress ────────────────────────────── */
.ai-progress{background:var(--sep);border-radius:100px;height:4px;overflow:hidden;margin:14px 0 8px;position:relative}
.ai-progress-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--t1),var(--t2));transition:width .4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.ai-progress-bar::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.5s infinite}
.ai-status{font-family:var(--fm);font-size:11px;color:var(--t3);text-align:center;letter-spacing:.04em}
.ai-timer{font-family:var(--fm);font-size:11px;color:var(--t4);text-align:center;margin-top:4px}

/* ── Animations ─────────────────────────────── */
/* ── Action cards (regar/analizar en detail) ── */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.action-card{
  border-radius:20px;padding:16px 14px;
  display:flex;flex-direction:column;gap:10px;
  cursor:pointer;transition:transform .12s;
  border:none;text-align:left;font-family:var(--fb);
  position:relative;overflow:hidden;min-height:100px;
}
.action-card:active{transform:scale(.97)}
.action-card-water{background:linear-gradient(145deg,#0ea5e9,#38bdf8);box-shadow:0 6px 24px rgba(14,165,233,.32)}
.action-card-check{background:linear-gradient(145deg,#8b5cf6,#a78bfa);box-shadow:0 6px 24px rgba(139,92,246,.32)}
.action-card-done{opacity:.72}
.action-card-icon{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff}
.action-card-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.07em;text-transform:uppercase;margin-top:auto}
.action-card-value{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.04em;line-height:1.1}
.action-card-sub{font-size:10px;color:rgba(255,255,255,.6);font-weight:500}
/* ── Stat cells — big numbers ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-cell{background:var(--bg2);border-radius:20px;border:1px solid var(--sep);padding:16px 12px 14px;text-align:center;box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-icon-wrap{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.stat-num{font-size:26px;font-weight:800;letter-spacing:-.05em;line-height:1}
.stat-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
/* ── Alert cards — premium ── */
.notif-card{background:var(--bg2);border-radius:22px;border:1px solid var(--sep);box-shadow:var(--sh);margin-bottom:8px;overflow:hidden}
.notif-header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.notif-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-title{font-size:13px;font-weight:700;letter-spacing:-.02em;flex:1;color:var(--t1)}
.notif-count{font-size:11px;font-weight:700;color:var(--t3)}
.notif-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-top:1px solid var(--sep)}
.notif-item-btn{border:none;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;gap:5px;flex-shrink:0;transition:transform .1s}
.notif-item-btn:active{transform:scale(.95)}
/* ── Weather card ── */
.wx-big{background:var(--bg2);border-radius:24px;border:1px solid var(--sep);padding:20px;margin-bottom:10px;box-shadow:var(--sh)}
.wx-temp{font-size:48px;font-weight:800;letter-spacing:-.05em;line-height:1}
.wx-desc{font-size:14px;font-weight:600;color:var(--t2);margin-top:2px}
.wx-meta{font-size:12px;color:var(--t3);margin-top:6px}
/* ── Stats page ── */
.stats-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stats-big-cell{background:var(--bg2);border-radius:20px;border:1px solid var(--sep);padding:18px 16px;box-shadow:var(--sh)}
.stats-big-num{font-size:36px;font-weight:800;letter-spacing:-.06em;line-height:1}
.stats-big-lbl{font-size:11px;font-weight:600;color:var(--t3);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
/* ── List search/sort ── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:40px!important}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.sort-pill{border:1.5px solid var(--sep);border-radius:100px;padding:7px 14px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--t2);cursor:pointer;font-family:var(--fb);transition:all .12s;flex-shrink:0}
.sort-pill.on{background:var(--t1);color:#fff;border-color:var(--t1)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
</style>

const PLANT_DB_LOWER=PLANT_DB.map(p=>({...p,_nl:p.n.toLowerCase(),_sl:(p.s||'').toLowerCase()}));
function searchPlantDB(q){
  if(!q||q.length<2)return PLANT_DB_LOWER.slice(0,50);
  const lq=q.toLowerCase();
  return PLANT_DB_LOWER.filter(p=>p._nl.includes(lq)||p._sl.includes(lq)).slice(0,60);
}

function icon(name,cls='',size=18){

  const wrapper=document.createElementNS('http://www.w3.org/2000/svg','svg');
  const tmp=document.createElement('div');tmp.innerHTML=svg;
  const src=tmp.querySelector('svg');
  wrapper.setAttribute('viewBox',src.getAttribute('viewBox')||'0 0 24 24');
  wrapper.setAttribute('width',size);wrapper.setAttribute('height',size);
  wrapper.setAttribute('fill','currentColor');
  if(cls)wrapper.setAttribute('class',cls);
  wrapper.style.flexShrink='0';
  Array.from(src.children).forEach(c=>wrapper.appendChild(c.cloneNode(true)));
  return wrapper;
}

function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='cls')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='for')e.htmlFor=v;
    else if(k[0]==='$')e.addEventListener(k.slice(1),v);
    else if(k==='val')e.value=v;
    else e.setAttribute(k,v);
  }
  for(const c of ch.flat()){
    if(c==null||c===false||c===undefined)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return e;
}
function svgEl(tag,attrs,...ch){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);for(const c of ch.flat())if(c)e.appendChild(c);return e;}

const getKey=()=>S.settings.apiKey||'';
async function compressImage(file,maxW=512){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1,maxW/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.6).split(',')[1]);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);fileToB64(file).then(res);};
    img.src=url;
  });
}

function startAIProgress(estimatedMs=15000){
  aiProgress=2;aiStartTime=Date.now();
  aiStatusMsg='Conectando con la IA…';
  clearInterval(aiProgressTimer);
  aiProgressTimer=setInterval(()=>{
    const elapsed=Date.now()-aiStartTime;
    const pct=Math.min(92,2+(elapsed/estimatedMs)*90);
    aiProgress=pct;
    const left=Math.max(0,Math.round((estimatedMs-elapsed)/1000));
    if(pct<30)aiStatusMsg='Conectando con la IA…';
    else if(pct<55)aiStatusMsg='Analizando imagen…';
    else if(pct<75)aiStatusMsg='Procesando resultados…';
    else aiStatusMsg='Casi listo…';
    // Update progress bar in DOM without full re-render
    const bar=document.querySelector('.ai-progress-bar');
    const status=document.querySelector('.ai-status');
    const timer=document.querySelector('.ai-timer');
    if(bar)bar.style.width=pct+'%';
    if(status)status.textContent=aiStatusMsg;
    if(timer)timer.textContent=left>0?'~'+left+'s':' ';
  },400);
}
function stopAIProgress(){
  clearInterval(aiProgressTimer);aiProgressTimer=null;
  aiProgress=100;aiStatusMsg='¡Listo!';
}
function buildProgressBar(){
  return el('div',{style:{padding:'0 4px'}},
    el('div',{cls:'ai-progress'},el('div',{cls:'ai-progress-bar',style:{width:aiProgress+'%'}})),
    el('div',{cls:'ai-status'},aiStatusMsg),
    el('div',{cls:'ai-timer'},' ')
  );
}

// IA via Groq - gratis con key propia, rapidísimo, visión con Llama 4 Scout
async function gemini(parts){
  const key=getKey();
  if(!key)throw new Error('NO_KEY');

  const textParts=parts.filter(p=>p.text);
  const imageParts=parts.filter(p=>p.inline_data);
  const hasImage=imageParts.length>0;

  // Texto primero, imagen después (requerido por Llama 4)
  const content=[];
  textParts.forEach(p=>content.push({type:'text',text:p.text}));
  imageParts.forEach(p=>content.push({
    type:'image_url',
    image_url:{url:'data:'+p.inline_data.mime_type+';base64,'+p.inline_data.data}
  }));

  const msgContent=content.length===1&&content[0].type==='text'?content[0].text:content;
  // Scout para visión (multimodal), llama-3.3 para texto (más rápido y barato)
  const model=hasImage
    ?'meta-llama/llama-4-scout-17b-16e-instruct'
    :'llama-3.3-70b-versatile';

  let r;
  try{
    r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+key
      },
      body:JSON.stringify({
        model:model,
        messages:[{role:'user',content:msgContent}],
        max_tokens:1000,
        temperature:0.1
      })
    });
  }catch(e){throw new Error('Sin conexión a internet');}

  const j=await r.json();
  if(j.error){
    const msg=(j.error.message||'').toLowerCase();
    if(r.status===401||msg.includes('invalid api key')||msg.includes('auth'))throw new Error('KEY');
    if(r.status===429||msg.includes('rate')||msg.includes('quota'))throw new Error('QUOTA');
    throw new Error(j.error.message||'Error de IA');
  }
  const text=j.choices?.[0]?.message?.content||'';
  if(!text)throw new Error('Sin respuesta de la IA');
  return text.replace(/```json|```/g,'').trim();
}
async function geminiJSON(parts){
  const txt=await gemini(parts);
  try{return JSON.parse(txt);}
  catch{
    const m=txt.match(/\{[\s\S]*\}/);
    if(m)try{return JSON.parse(m[0]);}catch{}
    throw new Error('Respuesta no valida');
  }
}

function fetchWeather(){
  wxState='loading';render();
  if(!navigator.geolocation){wxState='error';render();return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weathercode,windspeed_10m,precipitation&daily=precipitation_sum&timezone=auto&forecast_days=1`);
      const j=await r.json();
      let city='Tu ubicación';
      try{const g=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);const gj=await g.json();city=gj.address?.city||gj.address?.town||gj.address?.village||gj.address?.municipality||city;}catch{}
      const rain=j.daily?.precipitation_sum?.[0]??j.current?.precipitation??0;
      weather={temp:Math.round(j.current.temperature_2m),code:j.current.weathercode,humidity:j.current.relative_humidity_2m,wind:Math.round(j.current.windspeed_10m),rain,city,lat,lon};
      if(!S.settings.homeLocation){S.settings.homeLocation={lat,lon,city};saveS();}
      const thresh=S.settings.rainMm||8;
      if(rain>=thresh){
        S.plants=S.plants.map(p=>{if(!p.outdoor)return p;const days=WDAYS[p.watering]||7;const nxt=new Date();nxt.setDate(nxt.getDate()+days);return{...p,lastWatered:td(),nextWatering:nxt.toISOString().split('T')[0]};});
        saveS();toast(`🌧️ ${rain}mm — plantas exteriores regadas`,'i');
      }
      wxState='ok';
    }catch{wxState='error';}
    render();
  },()=>{wxState='error';render();});
}

function waterPlant(id){
  S.plants=S.plants.map(p=>{
    if(p.id!==id)return p;
    if(p.lastWatered===td()){toast('Ya fue regada hoy','w');return p;}
    const days=WDAYS[p.watering]||7;
    const nxt=new Date();nxt.setDate(nxt.getDate()+days);
    // Streak: consecutive on-time waterings (within 1 day grace)
    const prevDue=p.nextWatering;
    const onTime=!prevDue||daysUntil(prevDue)>=-1;
    const streak=(p.waterStreak||0);
    const newStreak=onTime?streak+1:1;
    if(newStreak>=3)toast('💧 Riego registrado · 🔥 '+newStreak+' días seguidos!');
    else toast('💧 Riego registrado');
    return{...p,lastWatered:td(),nextWatering:nxt.toISOString().split('T')[0],waterStreak:newStreak,waterStreakUpdated:td()};
  });
  saveS();render();
}

function sparkline(entries){
  if(!entries||entries.length<2)return null;
  const W=280,H=50,hs=entries.map(e=>e.height||0);
  const mx=Math.max(...hs),mn=Math.min(...hs),rng=mx-mn||1;
  const pts=entries.map((e,i)=>[(i/(entries.length-1))*(W-8)+4,H-4-((e.height-mn)/rng)*(H-10)]);
  const d=pts.map(([x,y],i)=>`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'spark'});
  svg.appendChild(svgEl('polygon',{points:`${pts.map(([x,y])=>`${x},${y}`).join(' ')} ${pts[pts.length-1][0]},${H} ${pts[0][0]},${H}`,fill:'rgba(45,106,79,.08)'}));
  svg.appendChild(svgEl('path',{d,fill:'none',stroke:'#2d6a4f','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'}));
  pts.forEach(([x,y],i)=>svg.appendChild(svgEl('circle',{cx:x,cy:y,r:i===pts.length-1?'4':'3',fill:i===pts.length-1?'#2d6a4f':'#fff',stroke:'#2d6a4f','stroke-width':'2'})));
  return svg;
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render(){
  const app=document.getElementById('app');
  const existingToast=app.querySelector('.toast');
  app.innerHTML='';
  if(existingToast)app.appendChild(existingToast);
  app.appendChild(buildHeader());
  const pageEl=el('div',{cls:'page'});
  if(page==='home')pageEl.appendChild(buildHome());
  else if(page==='list')pageEl.appendChild(buildList());
  else if(page==='detail')pageEl.appendChild(buildDetail());
  else if(page==='stats')pageEl.appendChild(buildStats());
  else if(page==='map')pageEl.appendChild(buildMapPage());
  else if(page==='chat')pageEl.appendChild(buildChatPage());
  else if(page==='settings')pageEl.appendChild(buildSettings());
  app.appendChild(pageEl);
  app.appendChild(buildFAB());
  app.appendChild(el('div',{cls:'safe-bottom'}));
  if(activeSheet==='plant')app.appendChild(buildSheetPlant());
  if(activeSheet==='entry')app.appendChild(buildSheetEntry());
  if(activeSheet==='check')app.appendChild(buildSheetCheck());
  if(page==='map')setTimeout(()=>{const mc=document.getElementById('leaflet-map');if(mc)initMap(mc);},100);
  if(page==='chat')setTimeout(()=>{const msgs=document.querySelector('.chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;},50);
}

// ═══════════════════════════════════
// HEADER
// ═══════════════════════════════════
function buildHeader(){
  const p=S.plants.find(x=>x.id===selId);
  const isPlants=page==='list'||page==='detail';
  const subtitles={home:'smart garden',list:'mis plantas',detail:p?p.name:'',stats:'estadísticas',map:'mapa & clima',chat:'asistente IA',settings:'ajustes'};
  const left=el('div',{cls:'flex ac gap8'},
    (page==='detail'||page==='settings'||page==='chat')
      ?el('button',{cls:'btn btn-g',style:{padding:'4px 8px'},$click:()=>{page=page==='settings'||page==='chat'?'home':'list';render();}},icon('back','',18))
      :null,
    el('div',{},el('div',{cls:'logo'},'plant.ai'),el('div',{cls:'logo-sub'},subtitles[page]||''))
  );
  const right=weather
    ?el('div',{cls:'flex ac gap8'},
        el('div',{cls:'tr'},el('div',{cls:'fw7',style:{fontSize:'16px'}},(WEMOJI[weather.code]||'🌡️')+' '+weather.temp+'°'),el('div',{cls:'fs10 ci3 fm'},(weather.city||'').slice(0,16))),
        el('button',{cls:'btn btn-g',style:{padding:'4px 8px',fontSize:'20px'},$click:()=>{page='map';render();}},'🗺️')
      )
    :el('button',{cls:'btn btn-g',style:{padding:'4px 8px',fontSize:'20px'},$click:()=>{page='map';render();}},'🗺️');
  const nav=el('div',{cls:'nav'},
    ...[{id:'home',icon:'home',label:'Inicio'},{id:'list',icon:'leaf',label:'Plantas'},{id:'stats',icon:'stats',label:'Stats'},{id:'chat',icon:'chat',label:'Chat IA'}].map(n=>
      el('button',{cls:'nb'+(page===n.id||(n.id==='list'&&isPlants)?' on':''),$click:()=>{page=n.id;if(n.id!=='list')selId=null;render();}},icon(n.icon,'',18),n.label)
    )
  );
  return el('div',{cls:'hdr'},el('div',{cls:'hdr-top'},left,right),nav);
}

function plantPhoto(p,size=56,radius=14){
  if(p.photo)return el('img',{cls:'pc-photo',src:p.photo,style:{width:size+'px',height:size+'px',borderRadius:radius+'px'}});
  return el('div',{cls:'pc-photo-em',style:{width:size+'px',height:size+'px',borderRadius:radius+'px',fontSize:Math.floor(size*0.55)+'px'}},p.icon||'🌿');
}

// ═══════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════
function buildHome(){
  const plants=S.plants;
  const needsW=plants.filter(p=>{const d=daysUntil(p.nextWatering);return d!==null&&d<=0;});
  const needsC=plants.filter(p=>{const d=daysUntil(p.nextCheck);return d!==null&&d<=0;});
  const thresh=S.settings.rainMm||8;
  const rainedOut=weather&&weather.rain>=thresh;
  const frag=document.createDocumentFragment();

  // ── Weather card ────────────────────────────────────────────
  frag.appendChild(buildWeatherCard());

  // ── Stats row ──────────────────────────────────────────────
  const statGrid=el('div',{cls:'stat-grid'});
  function makeStatCell(num,label,iconName,bg,color){
    const cell=el('div',{cls:'stat-cell'});
    const iconWrap=el('div',{cls:'stat-icon-wrap',style:{background:bg}});
    iconWrap.style.color=color;
    iconWrap.appendChild(icon(iconName,'',16));
    cell.appendChild(iconWrap);
    cell.appendChild(el('div',{cls:'stat-num',style:{color:num>0&&color!=='var(--t1)'?color:'var(--t1)'}},String(num)));
    cell.appendChild(el('div',{cls:'stat-lbl'},label));
    return cell;
  }
  statGrid.appendChild(makeStatCell(plants.length,'Plantas','leaf','rgba(0,201,110,.12)','var(--gr-d)'));
  statGrid.appendChild(makeStatCell(needsW.length,'Regar','water',needsW.length>0?'rgba(14,165,233,.12)':'rgba(0,0,0,.04)',needsW.length>0?'#0ea5e9':'var(--t3)'));
  statGrid.appendChild(makeStatCell(needsC.length,'Revisar','sparkle',needsC.length>0?'rgba(139,92,246,.12)':'rgba(0,0,0,.04)',needsC.length>0?'var(--pu)':'var(--t3)'));
  frag.appendChild(statGrid);

  // ── Rain alert ─────────────────────────────────────────────
  if(rainedOut){
    const op=plants.filter(p=>p.outdoor);
    if(op.length>0){
      const rc=el('div',{cls:'notif-card mb10'});
      const rh=el('div',{cls:'notif-header'});
      const ri=el('div',{cls:'notif-icon',style:{background:'rgba(14,165,233,.12)',color:'#0ea5e9'}});
      ri.appendChild(icon('rain','',16));
      rh.appendChild(ri);
      rh.appendChild(el('div',{cls:'notif-title'},'Ha llovido '+weather.rain+'mm hoy'));
      rh.appendChild(el('div',{cls:'notif-count'},op.length+' plantas'));
      rc.appendChild(rh);
      op.forEach(p=>{
        const item=el('div',{cls:'notif-item'});
        item.appendChild(plantPhoto(p,34,10));
        item.appendChild(el('span',{cls:'f1 fw7 fs13'},p.name));
        item.appendChild(el('span',{cls:'fs11 ci3'},'Regada'));
        rc.appendChild(item);
      });
      frag.appendChild(rc);
    }
  }

  // ── Water alerts ───────────────────────────────────────────
  const toW=needsW.filter(p=>!(rainedOut&&p.outdoor));
  if(toW.length>0){
    const wc=el('div',{cls:'notif-card'});
    const wh=el('div',{cls:'notif-header'});
    const wi=el('div',{cls:'notif-icon',style:{background:'rgba(14,165,233,.12)',color:'#0ea5e9'}});
    wi.appendChild(icon('water','',16));
    wh.appendChild(wi);
    wh.appendChild(el('div',{cls:'notif-title'},'Necesitan agua hoy'));
    wh.appendChild(el('div',{cls:'notif-count'},toW.length+' plantas'));
    wc.appendChild(wh);
    toW.forEach(p=>{
      const item=el('div',{cls:'notif-item'});
      item.appendChild(plantPhoto(p,34,10));
      item.appendChild(el('span',{cls:'f1 fw7 fs13'},p.name));
      const wb=el('button',{cls:'notif-item-btn',style:{background:'#0ea5e9',color:'#fff'},$click:e=>{e.stopPropagation();waterPlant(p.id);}});
      wb.appendChild(icon('water','',13));wb.append(' Regar');
      item.appendChild(wb);
      wc.appendChild(item);
    });
    frag.appendChild(wc);
  }

  // ── Health alerts ──────────────────────────────────────────
  if(needsC.length>0&&getKey()){
    const cc=el('div',{cls:'notif-card'});
    const ch=el('div',{cls:'notif-header'});
    const ci2=el('div',{cls:'notif-icon',style:{background:'rgba(139,92,246,.12)',color:'var(--pu)'}});
    ci2.appendChild(icon('sparkle','',16));
    ch.appendChild(ci2);
    ch.appendChild(el('div',{cls:'notif-title'},'Revisión de salud'));
    ch.appendChild(el('div',{cls:'notif-count'},needsC.length+' plantas'));
    cc.appendChild(ch);
    needsC.forEach(p=>{
      const item=el('div',{cls:'notif-item'});
      item.appendChild(plantPhoto(p,34,10));
      item.appendChild(el('span',{cls:'f1 fw7 fs13'},p.name));
      const ab=el('button',{cls:'notif-item-btn',style:{background:'var(--pu)',color:'#fff'},$click:e=>{e.stopPropagation();selId=p.id;checkState='idle';checkResult=null;activeSheet='check';render();}});
      ab.appendChild(icon('sparkle','',13));ab.append(' Analizar');
      item.appendChild(ab);
      cc.appendChild(item);
    });
    frag.appendChild(cc);
  }

  // ── AI activation prompt ───────────────────────────────────
  if(!getKey()){
    const aiCard=el('div',{cls:'notif-card',style:{cursor:'pointer'},$click:()=>{page='settings';render();}});
    const aih=el('div',{cls:'notif-header'});
    const aii=el('div',{cls:'notif-icon',style:{background:'rgba(139,92,246,.12)',color:'var(--pu)'}});
    aii.appendChild(icon('brain','',16));
    aih.appendChild(aii);
    aih.appendChild(el('div',{cls:'f1'},
      el('div',{cls:'fw7 fs13'},'Activa la IA — es gratis'),
      el('div',{cls:'fs12 ci3'},'Configura tu API key de Groq')
    ));
    const arr=el('div',{style:{color:'var(--t3)'}});arr.appendChild(icon('chevron_r','',18));
    aih.appendChild(arr);
    aiCard.appendChild(aih);
    frag.appendChild(aiCard);
  }

  // ── Tomorrow reminder ──────────────────────────────────────
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=tomorrow.toISOString().split('T')[0];
  const tmrW=plants.filter(p=>p.nextWatering===tomorrowStr&&p.lastWatered!==td());
  if(tmrW.length>0){
    const tc=el('div',{cls:'notif-card'});
    const th=el('div',{cls:'notif-header'});
    const ti=el('div',{cls:'notif-icon',style:{background:'rgba(0,201,110,.1)',color:'var(--gr-d)'}});
    ti.appendChild(icon('sunrise','',16));
    th.appendChild(ti);
    th.appendChild(el('div',{cls:'notif-title'},'Mañana toca regar'));
    th.appendChild(el('div',{cls:'notif-count'},tmrW.length));
    tc.appendChild(th);
    tmrW.forEach(p=>{
      const item=el('div',{cls:'notif-item'});
      item.appendChild(plantPhoto(p,34,10));
      item.appendChild(el('span',{cls:'f1 fw7 fs13'},p.name));
      item.appendChild(el('span',{cls:'fs11 fw7',style:{color:'var(--gr-d)'}},'Mañana'));
      tc.appendChild(item);
    });
    frag.appendChild(tc);
  }

  // ── Plant list header ──────────────────────────────────────
  frag.appendChild(el('div',{cls:'flex jb ac',style:{marginTop:'8px',marginBottom:'14px'}},
    el('div',{style:{fontSize:'20px',fontWeight:800,letterSpacing:'-.04em',color:'var(--t1)'}},'Mis plantas'),
    el('button',{cls:'sort-pill on',$click:()=>{page='list';render();}},'Ver todas')
  ));
  if(plants.length===0){
    const empty=el('div',{cls:'notif-card',style:{padding:'32px 20px',textAlign:'center'}});
    const ei=el('div',{style:{color:'var(--t4)',margin:'0 auto 16px',width:'fit-content'}});
    ei.appendChild(icon('plant_empty','',56));
    empty.appendChild(ei);
    empty.appendChild(el('div',{style:{fontWeight:800,fontSize:'18px',letterSpacing:'-.03em',marginBottom:'6px'}},'Sin plantas aún'));
    empty.appendChild(el('div',{cls:'fs13 ci3',style:{marginBottom:'20px'}},'Empieza añadiendo tu primera'));
    const addBtn=el('button',{cls:'btn btn-p',style:{gap:'7px'},$click:()=>{_fp=BP();aiState='idle';aiIdent=null;wizStep=0;wizAnswers={};wizResult=null;activeSheet='plant';render();}});
    addBtn.appendChild(icon('plus','',16));addBtn.append('Añadir planta');
    empty.appendChild(addBtn);
    frag.appendChild(empty);
  } else {
    plants.slice(0,3).forEach(p=>frag.appendChild(buildPlantCard(p,true)));
    if(plants.length>3){
      const moreBtn=el('button',{cls:'btn btn-s btn-full',style:{marginTop:'8px',gap:'6px'},$click:()=>{page='list';render();}});
      moreBtn.append('Ver las '+plants.length+' plantas');
      moreBtn.appendChild(icon('chevron_r','',14));
      frag.appendChild(moreBtn);
    }
  }
  return frag;
}

function statBox(n,label,color){return el('div',{cls:'stat-cell'},el('div',{cls:'stat-num',style:{color}},String(n)),el('div',{cls:'stat-lbl'},label));}

function buildWeatherCard(){
  if(wxState==='loading'){
    const c=el('div',{cls:'notif-card',style:{marginBottom:'10px',padding:'16px'}});
    const h=el('div',{cls:'flex ac gap10'});
    const dot=el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--gr-d)',animation:'pulse 1s infinite',flexShrink:0}});
    h.appendChild(dot);h.appendChild(el('span',{cls:'fs13 ci3'},'Obteniendo clima…'));
    c.appendChild(h);return c;
  }
  if(!weather){
    const c=el('div',{cls:'notif-card',style:{marginBottom:'10px'}});
    const h=el('div',{cls:'notif-header'});
    const ic=el('div',{cls:'notif-icon',style:{background:'rgba(0,102,255,.1)',color:'var(--bl)'}});
    ic.appendChild(icon('cloud','',16));h.appendChild(ic);
    h.appendChild(el('div',{cls:'f1'},el('div',{cls:'fw7 fs13'},'Sin datos de clima'),el('div',{cls:'fs12 ci3'},'Necesitas permitir la ubicación')));
    const ob=el('button',{cls:'btn btn-p btn-sm',style:{gap:'5px'},$click:fetchWeather});ob.appendChild(icon('location','',13));ob.append('Obtener');
    h.appendChild(ob);c.appendChild(h);return c;
  }
  const rain=weather.rain||0,thresh=S.settings.rainMm||8;
  const c=el('div',{cls:'notif-card',style:{marginBottom:'10px'}});
  const main=el('div',{style:{padding:'16px 16px 14px',display:'flex',alignItems:'center',gap:'14px'}});
  // Weather icon (emoji in a styled box)
  const emojiBox=el('div',{style:{width:'52px',height:'52px',borderRadius:'16px',background:'rgba(0,0,0,.04)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',flexShrink:0}});
  emojiBox.textContent=WEMOJI[weather.code]||'🌤';
  main.appendChild(emojiBox);
  const info=el('div',{cls:'f1'});
  info.appendChild(el('div',{style:{fontSize:'32px',fontWeight:800,letterSpacing:'-.05em',lineHeight:1,color:'var(--t1)'}},weather.temp+'°C'));
  info.appendChild(el('div',{style:{fontSize:'13px',fontWeight:600,color:'var(--t2)',marginTop:'2px'}},(WTXT[weather.code]||'')));
  const locLine=el('div',{cls:'flex ac gap4',style:{marginTop:'5px'}});
  locLine.appendChild(icon('location','ci3',11));
  locLine.appendChild(el('span',{cls:'fs11 ci3'},weather.city));
  info.appendChild(locLine);
  main.appendChild(info);
  // Meta
  const meta=el('div',{style:{textAlign:'right',flexShrink:0}});
  meta.appendChild(el('div',{cls:'fs12 fw7',style:{color:'var(--t2)'}},weather.humidity+'%'));
  meta.appendChild(el('div',{cls:'fs10 ci3'},'Humedad'));
  meta.appendChild(el('div',{cls:'fs12 fw7 mt8',style:{color:'var(--t2)'}},weather.wind+' km/h'));
  meta.appendChild(el('div',{cls:'fs10 ci3'},'Viento'));
  main.appendChild(meta);
  // Refresh btn
  const rfBtn=el('button',{style:{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:'4px',marginLeft:'2px',flexShrink:0},$click:fetchWeather});
  rfBtn.appendChild(icon('refresh','',16));
  main.appendChild(rfBtn);
  c.appendChild(main);
  if(rain>=thresh){
    const rainBar=el('div',{style:{margin:'0 16px 12px',background:'rgba(14,165,233,.08)',borderRadius:'12px',padding:'9px 14px',fontSize:'12px',fontWeight:700,color:'#0ea5e9',display:'flex',alignItems:'center',gap:'8px'}});
    rainBar.appendChild(icon('rain','',14));
    rainBar.append(' '+rain+'mm — riego exterior pospuesto');
    c.appendChild(rainBar);
  }
  return c;
}

// ═══════════════════════════════════
// PLANT CARD
// ═══════════════════════════════════
function buildPlantCard(p,gradient=false){
  const du=daysUntil(p.nextWatering),overdue=du!==null&&du<=0;
  const checkDue=daysUntil(p.nextCheck)!==null&&daysUntil(p.nextCheck)<=0;
  const vi=VIT[p.vitality]||VIT['bueno'];
  const tlDue=p.nextTimelapseDate&&td()>=p.nextTimelapseDate;
  const streak=p.waterStreak||0;
  const wateredToday=p.lastWatered===td();

  // ── Gradient card style (home) ──
  if(gradient){
    const grad=plantGrad(p);
    const card=el('div',{
      cls:'gcard',
      style:{background:grad,cursor:'pointer'},
      $click:()=>{selId=p.id;activeTab='ficha';page='detail';render();}
    });
    card.appendChild(el('div',{cls:'gcard-orb'}));
    card.appendChild(el('div',{cls:'gcard-orb2'}));
    const top=el('div',{cls:'flex jb ac'});
    const titleBlock=el('div',{});
    titleBlock.appendChild(el('div',{cls:'gcard-title'},p.name));
    if(p.species)titleBlock.appendChild(el('div',{cls:'gcard-sub'},p.species));
    top.appendChild(titleBlock);
    // Plant photo if exists
    if(p.photo){
      const img=el('img',{cls:'',style:{width:'64px',height:'64px',borderRadius:'16px',objectFit:'cover',border:'2.5px solid rgba(255,255,255,.35)',flexShrink:0}});
      img.src=p.photo;top.appendChild(img);
    } else {
      const em=el('div',{style:{width:'56px',height:'56px',borderRadius:'14px',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}});
      em.appendChild(icon('leaf','',24));em.style.color='rgba(255,255,255,.8)';
      top.appendChild(em);
    }
    card.appendChild(top);
    // Bottom row
    const bot=el('div',{cls:'flex jb ac',style:{marginTop:'12px'}});
    const badges=el('div',{cls:'flex gap6'});
    // Water status badge
    const wLabel=overdue?'Regar ya':du===0?'Regar hoy':du===1?'Mañana':'en '+du+'d';
    const wb=el('div',{cls:'gcard-badge'});
    wb.appendChild(icon('water','',12));wb.append(' '+wLabel);
    badges.appendChild(wb);
    if(streak>=3){const sb=el('div',{cls:'gcard-badge'});sb.appendChild(icon('flame','',12));sb.append(' '+streak);badges.appendChild(sb);}
    bot.appendChild(badges);
    // Water button
    const wBtn=el('button',{
      style:{width:'36px',height:'36px',borderRadius:'50%',background:'rgba(255,255,255,.25)',border:'1.5px solid rgba(255,255,255,.35)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0,transition:'background .12s'},
      $click:e=>{e.stopPropagation();waterPlant(p.id);}
    });
    wBtn.appendChild(wateredToday?icon('check','',15):icon('water','',15));
    bot.appendChild(wBtn);
    card.appendChild(bot);
    return card;
  }

  // ── Standard list card ──
  // Quick action circular buttons
  const qStyle={width:'34px',height:'34px',borderRadius:'50%',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'transform .1s'};
  const quickWater=el('button',{style:{...qStyle,background:wateredToday?'rgba(0,0,0,.07)':'#0ea5e9',color:wateredToday?'var(--t3)':'#fff',opacity:wateredToday?.8:1},$click:e=>{e.stopPropagation();waterPlant(p.id);}});
  quickWater.appendChild(wateredToday?icon('check','',15):icon('water','',15));

  let quickCheck=null;
  if(checkDue&&getKey()){
    quickCheck=el('button',{style:{...qStyle,background:'rgba(139,92,246,.15)',color:'var(--pu)'},$click:e=>{e.stopPropagation();selId=p.id;checkState='idle';checkResult=null;activeSheet='check';render();}});
    quickCheck.appendChild(icon('sparkle','',15));
  }

  return el('div',{cls:'pc',$click:()=>{selId=p.id;activeTab='ficha';page='detail';render();}},
    el('div',{cls:'pc-line',style:{background:vi.dot}}),
    el('div',{style:{position:'relative',flexShrink:0}},plantPhoto(p),tlDue?el('div',{cls:'tl-badge'}):null),
    el('div',{cls:'pc-info'},
      el('div',{cls:'flex ac gap8 mb4'},
        el('span',{cls:'pc-name'},p.name),
        vbadge(p.vitality),
        streak>=3?el('span',{cls:'flex ac gap4',style:{color:'#f97316',fontSize:'11px',fontWeight:700,fontFamily:'var(--fm)'}},icon('flame','',13),' '+streak):null
      ),
      el('div',{cls:'pc-sp'},p.species||'Especie sin especificar'),
      el('div',{cls:'pc-meta'},
        el('span',{cls:'flex ac gap4 fs12 ci3'},icon('location','ci3',11),' '+(p.location||'Sin ubicar')),
        overdue?el('span',{cls:'fs12 fw7 cam'},'Regar ya'):du===1?el('span',{cls:'fs12 ci3'},'mañana'):du!==null&&du<=3?el('span',{cls:'fs12 ci3'},'en '+du+'d'):null
      )
    ),
    el('div',{cls:'flex gap6 ac',style:{flexShrink:0}},quickCheck,quickWater)
  );
}

// ═══════════════════════════════════
// LIST PAGE
// ═══════════════════════════════════
function buildList(){
  const frag=document.createDocumentFragment();

  // Search
  const searchWrap=el('div',{cls:'search-wrap'});
  const si=el('div',{cls:'search-icon'});si.appendChild(icon('search','',15));
  searchWrap.appendChild(si);
  const inp=el('input',{type:'text',placeholder:'Buscar por nombre o especie…',val:search});
  inp.addEventListener('input',e=>{search=e.target.value;render();});
  searchWrap.appendChild(inp);
  frag.appendChild(searchWrap);

  // Sort pills
  const sorts=[
    {id:'next-water',label:'Riego',iconName:'water'},
    {id:'name',label:'A–Z',iconName:'leaf'},
    {id:'vitality',label:'Salud',iconName:'sparkle'},
    {id:'acquired',label:'Nuevas',iconName:'calendar'},
  ];
  const sortRow=el('div',{cls:'flex gap6',style:{marginBottom:'14px',overflowX:'auto',paddingBottom:'2px'}});
  sorts.forEach(s=>{
    const active=listSort===s.id;
    const pill=el('button',{
      cls:'sort-pill'+(active?' on':''),
      $click:()=>{listSort=s.id;render();}
    },s.label);
    sortRow.appendChild(pill);
  });
  frag.appendChild(sortRow);

  let filtered=S.plants.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.species||'').toLowerCase().includes(search.toLowerCase()));

  // Sort
  const vitOrder={óptimo:0,bueno:1,atención:2,crítico:3};
  if(listSort==='next-water')filtered=[...filtered].sort((a,b)=>{
    const da=daysUntil(a.nextWatering)??99,db=daysUntil(b.nextWatering)??99;return da-db;
  });

async function suggestNextTimelapse(plant){
  try{
    const photos=(plant.timelapsePhotos||[]).length;
    const txt=await gemini([{text:`Planta: ${plant.name} (${plant.species||'?'}), riego: ${plant.watering}, en ${plant.location}. Tiene ${photos} fotos de timelapse. ¿Cada cuántos días debería hacer una foto para un buen timelapse del crecimiento? Responde SOLO un número entero de días, nada más.`}]);
    const days=parseInt(txt.trim())||14;
    const next=new Date();next.setDate(next.getDate()+days);
    S.plants=S.plants.map(pp=>pp.id===plant.id?{...pp,timelapseIntervalDays:days,nextTimelapseDate:next.toISOString().split('T')[0]}:pp);
    saveS();render();
    toast('📸 Próxima foto en '+days+' días');
  }catch(e){
    // fallback: 14 days
    const next=new Date();next.setDate(next.getDate()+14);
    S.plants=S.plants.map(pp=>pp.id===plant.id?{...pp,timelapseIntervalDays:14,nextTimelapseDate:next.toISOString().split('T')[0]}:pp);
    saveS();render();
  }
}

function buildTabTimelapse(p){
  const frag=document.createDocumentFragment();
  const photos=p.timelapsePhotos||[];
  const MAX=10;
  const tlDue=p.nextTimelapseDate&&td()>=p.nextTimelapseDate;

  // Header card: next photo reminder + add button
  const hCard=el('div',{cls:'card'+(tlDue?' alert-pu':'')});
  hCard.appendChild(el('div',{cls:'sl'+(tlDue?' sl-pu':'')},'📸 Timelapse del crecimiento'));

    const d=daysUntil(p.nextTimelapseDate);

  }
  // Add photo button
  const addLabel=el('label',{cls:'btn btn-p btn-full',style:{cursor:'pointer',display:'block',textAlign:'center'}},
    photos.length>=MAX?'Límite alcanzado ('+MAX+')':photos.length===0?'Primera foto':'Añadir foto de hoy'
  );
  if(photos.length<MAX){
    const fi=el('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
    fi.addEventListener('change',async e=>{
      const file=e.target.files?.[0];if(!file)return;
      // Compress to ~300px for storage
      const b64=await new Promise(res=>{
        const img=new Image(),url=URL.createObjectURL(file);

          const s=Math.min(1,300/Math.max(img.width,img.height));
          const c=document.createElement('canvas');
          c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          URL.revokeObjectURL(url);
          res(c.toDataURL('image/jpeg',0.7));
        };img.src=url;
      });
      const newPhoto={id:uid(),date:td(),dataUrl:b64};
      const updated=[...(p.timelapsePhotos||[]),newPhoto].slice(-MAX);
      // Schedule next
      const days=p.timelapseIntervalDays||14;
      const next=new Date();next.setDate(next.getDate()+days);
      S.plants=S.plants.map(pp=>pp.id===p.id?{...pp,timelapsePhotos:updated,nextTimelapseDate:next.toISOString().split('T')[0]}:pp);
      saveS();
      // If first photo, ask AI for interval
      if((p.timelapsePhotos||[]).length===0)suggestNextTimelapse(S.plants.find(x=>x.id===p.id));
      else{toast('📸 Foto añadida al timelapse');render();}
      tlIdx=updated.length-1;
    });
    addLabel.appendChild(fi);
  }
  hCard.appendChild(addLabel);
  frag.appendChild(hCard);

  if(photos.length===0){
    frag.appendChild(el('div',{cls:'card empty'},
      el('div',{cls:'empty-em'},'📸'),
      el('div',{cls:'empty-t'},'Sin fotos todavía'),
      el('div',{cls:'empty-s'},'Haz la primera foto y la IA calculará cada cuánto deberías hacer una para capturar el crecimiento')
    ));
    return frag;
  }

  // Clamp tlIdx
  if(tlIdx>=photos.length)tlIdx=photos.length-1;
  if(tlIdx<0)tlIdx=0;
  const cur=photos[tlIdx];

  // Viewer
  const viewer=el('div',{cls:'tl-viewer card'});
  const img=el('img',{src:cur.dataUrl,style:{width:'100%',height:'100%',objectFit:'contain'}});
  viewer.appendChild(img);
  if(photos.length>1){
    const prev=el('button',{cls:'tl-nav prev',$click:e=>{e.stopPropagation();tlIdx=Math.max(0,tlIdx-1);render();}},'‹');
    const next=el('button',{cls:'tl-nav next',$click:e=>{e.stopPropagation();tlIdx=Math.min(photos.length-1,tlIdx+1);render();}},'›');
    viewer.appendChild(prev);viewer.appendChild(next);
  }
  // Date label
  viewer.appendChild(el('div',{style:{position:'absolute',bottom:'10px',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.5)',color:'#fff',borderRadius:'100px',padding:'3px 10px',fontSize:'11px',fontFamily:'var(--fm)',whiteSpace:'nowrap'}},fmtL(cur.date)+' · '+(tlIdx+1)+'/'+photos.length));
  frag.appendChild(viewer);

  // Play/stop button
  if(photos.length>1){
    const playBtn=el('button',{cls:'btn btn-s btn-full mb12',$click:()=>{
      if(tlPlaying){
        tlPlaying=false;clearInterval(tlTimer);tlTimer=null;render();
      }else{
        tlPlaying=true;tlIdx=0;
        tlTimer=setInterval(()=>{
          tlIdx++;
          if(tlIdx>=photos.length){tlIdx=0;tlPlaying=false;clearInterval(tlTimer);tlTimer=null;}
          // Update image directly without full re-render for smooth animation
          const im=document.querySelector('.tl-viewer img');
          if(im)im.src=photos[tlIdx]?.dataUrl||'';
          if(!tlPlaying)render();
        },600);
        render();
      }
    }},tlPlaying?'⏹ Parar animación':'▶️ Ver timelapse animado');
    frag.appendChild(playBtn);
  }

  // Thumbnail grid
  const grid=el('div',{cls:'tl-grid'});
  photos.forEach((ph,i)=>{
    const thumb=el('div',{cls:'tl-thumb'+(i===tlIdx?' selected':''),$click:()=>{tlIdx=i;render();}});
    thumb.appendChild(el('img',{src:ph.dataUrl}));
    thumb.appendChild(el('div',{cls:'tl-date'},fmtL(ph.date)));
    // Delete button
    const del=el('button',{style:{position:'absolute',top:'3px',right:'3px',width:'20px',height:'20px',borderRadius:'50%',background:'rgba(0,0,0,.5)',color:'#fff',border:'none',fontSize:'11px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'},$click:e=>{
      e.stopPropagation();
      if(confirm('¿Eliminar esta foto?')){
        const updated=photos.filter((_,j)=>j!==i);
        S.plants=S.plants.map(pp=>pp.id===p.id?{...pp,timelapsePhotos:updated}:pp);
        saveS();if(tlIdx>=updated.length)tlIdx=Math.max(0,updated.length-1);render();
      }
    }},'×');
    thumb.appendChild(del);
    grid.appendChild(thumb);
  });
  frag.appendChild(el('div',{cls:'card'},el('div',{cls:'sl'},photos.length+'/'+MAX+' fotos'),grid));

  return frag;
}

function buildStats(){
  const plants=S.plants;
  const tg=plants.reduce((a,p)=>{const h=(p.entries||[]).map(e=>e.height||0);return a+(h.length>=2?Math.max(...h)-Math.min(...h):0);},0);
  const byV=Object.entries(plants.reduce((a,p)=>({...a,[p.vitality]:(a[p.vitality]||0)+1}),{}));
  const byL=Object.entries(plants.reduce((a,p)=>({...a,[p.location||'Sin ubicar']:(a[p.location||'Sin ubicar']||0)+1}),{}));
  const optimo=plants.filter(p=>p.vitality==='óptimo').length;
  const exterior=plants.filter(p=>p.outdoor).length;
  const frag=document.createDocumentFragment();

  // ── Big number grid ──────────────────────────────────────
  const bigGrid=el('div',{cls:'stats-big-grid'});
  function bigCell(num,label,iconName,color,bg){

    iw.appendChild(icon(iconName,'',18));
    top.appendChild(iw);
    cell.appendChild(top);
    cell.appendChild(el('div',{cls:'stats-big-num',style:{color:color}},String(num)));
    cell.appendChild(el('div',{cls:'stats-big-lbl'},label));
    return cell;
  }
  bigGrid.appendChild(bigCell(plants.length,'Total plantas','leaf','var(--gr-d)','rgba(0,201,110,.1)'));
  bigGrid.appendChild(bigCell(tg>0?tg+'cm':'—','Crecimiento','zap','var(--am)','rgba(255,149,0,.1)'));
  bigGrid.appendChild(bigCell(exterior,'Exterior','garden','var(--bl)','rgba(0,102,255,.1)'));
  bigGrid.appendChild(bigCell(optimo,'Estado óptimo','sparkle','var(--pu)','rgba(139,92,246,.1)'));
  frag.appendChild(bigGrid);

  // ── Vitality breakdown ────────────────────────────────────
  if(plants.length>0){
    const vitCard=el('div',{cls:'notif-card',style:{marginBottom:'8px'}});
    const vh=el('div',{cls:'notif-header'});
    const vi2=el('div',{cls:'notif-icon',style:{background:'rgba(0,201,110,.1)',color:'var(--gr-d)'}});
    vi2.appendChild(icon('leaf','',16));
    vh.appendChild(vi2);
    vh.appendChild(el('div',{cls:'notif-title'},'Estado de vitalidad'));
    vitCard.appendChild(vh);
    byV.forEach(([v,c])=>{
      const vi=VIT[v]||VIT['bueno'];
      const pct=Math.round(c/plants.length*100);
      const row=el('div',{style:{padding:'10px 16px',borderTop:'1px solid var(--sep)'}});
      row.appendChild(el('div',{cls:'flex jb ac mb4'},vbadge(v),el('span',{style:{fontSize:'13px',fontWeight:800,color:'var(--t1)'}},c)));
      const bar=el('div',{style:{height:'4px',background:'var(--sep)',borderRadius:'4px',overflow:'hidden'}});
      const fill=el('div',{style:{height:'100%',borderRadius:'4px',background:vi.dot,width:pct+'%',transition:'width .6s'}});
      bar.appendChild(fill);row.appendChild(bar);
      vitCard.appendChild(row);
    });
    frag.appendChild(vitCard);
  }

  // ── Watering schedule ─────────────────────────────────────
  const sorted=plants.filter(p=>p.nextWatering).sort((a,b)=>new Date(a.nextWatering)-new Date(b.nextWatering));
  if(sorted.length>0){
    const wc=el('div',{cls:'notif-card',style:{marginBottom:'8px'}});
    const wh=el('div',{cls:'notif-header'});
    const wi=el('div',{cls:'notif-icon',style:{background:'rgba(14,165,233,.1)',color:'#0ea5e9'}});
    wi.appendChild(icon('water','',16));
    wh.appendChild(wi);
    wh.appendChild(el('div',{cls:'notif-title'},'Calendario de riego'));
    wc.appendChild(wh);
    sorted.slice(0,6).forEach(p=>{
      const d=daysUntil(p.nextWatering);
      const overdue=d<=0;
      const item=el('div',{cls:'notif-item'});
      item.appendChild(plantPhoto(p,34,10));
      item.appendChild(el('div',{cls:'f1'},
        el('div',{cls:'fw7 fs13'},p.name),
        el('div',{cls:'fs11 ci3',style:{marginTop:'2px'}},p.watering||'—')
      ));
      item.appendChild(el('span',{style:{fontSize:'12px',fontWeight:800,color:overdue?'var(--rd)':d===1?'var(--am)':'var(--gr-d)',background:overdue?'var(--rd-bg)':d===1?'var(--am-bg)':'var(--gr-bg)',padding:'4px 10px',borderRadius:'100px'}},
        overdue?'Hoy':d===1?'Mañana':'+'+d+'d'));
      wc.appendChild(item);
    });
    frag.appendChild(wc);
  }

  // ── Location breakdown ────────────────────────────────────
  if(byL.length>0){
    const lc=el('div',{cls:'notif-card'});
    const lh=el('div',{cls:'notif-header'});

    li.appendChild(icon('location','',16));
    lh.appendChild(li);
    lh.appendChild(el('div',{cls:'notif-title'},'Por ubicación'));
    lc.appendChild(lh);
    byL.forEach(([l,c])=>{
      const item=el('div',{cls:'notif-item'});
      item.appendChild(el('span',{cls:'f1 fw7 fs13',style:{textTransform:'capitalize'}},l));
      item.appendChild(el('span',{style:{fontSize:'20px',fontWeight:800,letterSpacing:'-.04em',color:'var(--t1)'}},c));
      lc.appendChild(item);
    });
    frag.appendChild(lc);
  }
  return frag;
}

// Plant picker component — shared by wizard form and AI result correction
function buildPlantPicker(value, onSelect, placeholder='Buscar planta…'){
  const wrap=el('div',{cls:'pp-wrap'});
  const inp=el('input',{
    type:'text',
    placeholder:placeholder,
    val:value,
    style:{width:'100%'},
    $input:e=>{ppQuery=e.target.value;_fp.name=e.target.value;ppOpen=true;
      // Update list without full render for speed
      const list=wrap.querySelector('.pp-list');
      if(list)renderPickerList(list,onSelect);
      else{const l=el('div',{cls:'pp-list'});renderPickerList(l,onSelect);wrap.appendChild(l);}
    },
    $focus:e=>{ppOpen=true;ppQuery=e.target.value;
      if(!wrap.querySelector('.pp-list')){const l=el('div',{cls:'pp-list'});renderPickerList(l,onSelect);wrap.appendChild(l);}

function renderPickerList(list, onSelect){
  list.innerHTML='';
  const results=searchPlantDB(ppQuery);
  if(results.length===0){
    list.appendChild(el('div',{cls:'pp-item',style:{color:'var(--t3)',fontSize:'13px'}},'Sin resultados para "'+ppQuery+'"'));
    return;
  }
  results.forEach(p=>{
    const item=el('div',{cls:'pp-item'});
    item.appendChild(el('span',{cls:'pp-item-em'},p.i));
    const info=el('div',{cls:'pp-item-info'});
    info.appendChild(el('div',{cls:'pp-item-name'},p.n));
    info.appendChild(el('div',{cls:'pp-item-sp'},p.s));
    item.appendChild(info);
    item.addEventListener('mousedown',e=>{e.preventDefault();onSelect(p);});
    list.appendChild(item);
  });
}

function applyPlantFromDB(p){
  // Apply plant DB entry to current plant form
  _fp.name=p.n;
  _fp.species=p.s;
  _fp.icon=p.i;
  ppQuery=p.n;// keep search field showing selected name
  // Map watering days to closest WDAYS option
  const closest=WATERS.reduce((a,w)=>Math.abs(WDAYS[w]-p.w)<Math.abs(WDAYS[a]-p.w)?w:a,WATERS[0]);
  _fp.watering=closest;
  // Map sunlight
  const sunMap={'pleno sol':'Pleno sol','sol parcial':'Sol parcial','indirecta brillante':'Indirecta brillante','indirecta':'Indirecta','sombra':'Sombra/Umbría','poca luz':'Sombra/Umbría'};
  _fp.sunlight=sunMap[p.sun]||_fp.sunlight;
  _fp.fertilizer=p.fert||_fp.fertilizer;
  _fp.soil=p.soil||_fp.soil;
  ppQuery='';ppOpen=false;
  render();
  toast('✅ '+p.n+' seleccionada');
}

function buildSheetPlant(){

    el('span',{cls:'sh'}),

          el('button',{cls:'btn btn-s btn-sm',style:{flexShrink:0},$click:()=>{

  }

    }
    sb.appendChild(btn('🌱 Añadir esta planta','btn-p btn-full',()=>{addPlant();}));
    sb.appendChild(btn('← Volver atrás','btn-g btn-full mt4 fs13',()=>{wizResult=null;render();}));
  }

  ov.appendChild(sb);return ov;
}

function buildSheetCheck(){
  const p=S.plants.find(x=>x.id===selId);
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov&&checkState!=='loading')closeSheet();}});
  const sb=el('div',{cls:'sb'});
  sb.appendChild(el('div',{cls:'shdr'},el('span',{cls:'sh'}),el('div',{cls:'flex jb ac'},el('div',{cls:'st'},'Análisis IA'),checkState!=='loading'?el('button',{cls:'btn btn-g',style:{fontSize:'20px',padding:'4px 8px',color:'var(--t3)'},$click:closeSheet},'×'):null),p?el('div',{cls:'fs13 ci3',style:{marginTop:'4px'}},p.icon+' '+p.name):null));
  if(checkState==='idle'){
    // Show photo option first
    sb.appendChild(el('div',{cls:'tc',style:{padding:'10px 0 20px'}},
      el('div',{style:{fontSize:'48px',marginBottom:'12px'}},'📸'),
      el('div',{cls:'fw7 fs16 mb8'},'¿Quieres hacer una foto?'),
      el('div',{cls:'fs13 ci3 mb20',style:{lineHeight:'1.6'}},'La IA puede ver el estado visual de la planta para un análisis más preciso.'),
      el('label',{cls:'btn btn-p btn-full mb10',style:{cursor:'pointer',justifyContent:'center'}},
        'Hacer foto y analizar',
        el('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'},
          $change:async e=>{
            const f=e.target.files?.[0];
            if(!f)return;
            checkState='loading';render();
            const b64=await compressImage(f);
            runCheck(selId,b64);
          }
        })
      ),
      btn('Analizar sin foto','btn-s btn-full',()=>runCheck(selId,null))
    ));
  } else if(checkState==='loading'){sb.appendChild(el('div',{cls:'wiz-loading'},el('div',{cls:'wiz-loading-em'},'🔬'),el('div',{cls:'empty-t'},'Analizando el estado…'),el('div',{cls:'empty-s'},'La IA evalúa todos los datos de tu planta'),buildProgressBar()));}
  else if(checkState==='done'&&checkResult){
    const vi=VIT[checkResult.vitality]||VIT['bueno'];
    sb.appendChild(el('div',{style:{background:vi.bg,border:'1.5px solid '+vi.dot+'40',borderRadius:'18px',padding:'20px',marginBottom:'14px',textAlign:'center'}},
      el('div',{style:{marginBottom:'8px'}},vbadge(checkResult.vitality,true)),
      el('div',{style:{fontFamily:'var(--fd)',fontSize:'20px',fontWeight:'800',color:vi.color,margin:'8px 0'}},checkResult.headline),
      el('div',{style:{fontSize:'36px',fontWeight:'900',color:vi.dot}},checkResult.score,el('span',{style:{fontSize:'16px',fontWeight:'400',color:vi.color}},'/100')),
      el('div',{cls:'sbt mt12'},el('div',{cls:'sbf',style:{width:checkResult.score+'%',background:vi.dot}}))
    ));
    sb.appendChild(el('div',{cls:'card'},el('div',{cls:'sl'},'Diagnóstico'),el('p',{cls:'fs14 ci2',style:{lineHeight:'1.7',margin:0}},checkResult.diagnosis)));
    if(checkResult.transplantNeeded)sb.appendChild(el('div',{cls:'card alert-y'},el('div',{cls:'sl sl-am'},'🪴 Trasplante recomendado'),el('div',{cls:'fs13 ci2',style:{lineHeight:'1.6'}},checkResult.transplantReason||'')));
    if(checkResult.positives?.length>0){const pc=el('div',{cls:'card alert-g'});pc.appendChild(el('div',{cls:'sl sl-gr'},'✓ Puntos positivos'));checkResult.positives.forEach(p=>pc.appendChild(el('div',{cls:'ri'},el('span',{cls:'cgr fw7'},'✓'),el('span',{cls:'f1 fs13 ci2'},p))));sb.appendChild(pc);}
    if(checkResult.actions?.length>0){
      const ac=el('div',{cls:'card'},el('div',{cls:'sl'},'Acciones recomendadas'));
      checkResult.actions.forEach(a=>{const pcolor=a.priority==='alta'?'var(--rd)':a.priority==='media'?'var(--am)':'var(--gr)';const pbg=a.priority==='alta'?'#fef2f2':a.priority==='media'?'#fffbeb':'#f0faf4';ac.appendChild(el('div',{cls:'ri ac'},el('span',{cls:'fs10 fw8 fm upper',style:{padding:'3px 7px',borderRadius:'100px',background:pbg,color:pcolor,flexShrink:0}},a.priority),el('span',{cls:'f1 fs13 ci2',style:{lineHeight:'1.5'}},a.action)));});sb.appendChild(ac);
    }
    sb.appendChild(el('div',{cls:'fs12 ci3 tc mb12'},'Próximo análisis en '+checkResult.nextCheckDays+' días · cada '+checkResult.nextCheckDays+' días'));
    sb.appendChild(btn('Entendido','btn-p btn-full',closeSheet));
  } else if(checkState==='error'){sb.appendChild(el('div',{cls:'empty'},el('div',{cls:'empty-em'},'❌'),el('div',{cls:'empty-t'},'Error en el análisis'),btn('Reintentar','btn-p',()=>{checkState='idle';render();})));}
  ov.appendChild(sb);return ov;
}
