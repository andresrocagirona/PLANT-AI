<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="plant.ai">
<meta name="theme-color" content="#faf8f5">
<title>plant.ai</title>
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAABmJLR0QA/wD/AP+gvaeTAAAC7ElEQVR4nO3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHgAAAABJRU5ErkJggg==">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cr:#f7f4ef;--pa:#faf8f5;--wh:#fff;
  --i1:#1a1a18;--i2:#4a4a45;--i3:#9a9990;
  --gr:#2d6a4f;--gl:#52b788;--gx:#d8f3dc;
  --am:#d97706;--rd:#dc2626;--bl:#1d4ed8;
  --bd:#e8e4dc;--sh:rgba(26,26,24,.07);
  --fd:'Fraunces',Georgia,serif;
  --fb:'DM Sans','Helvetica Neue',sans-serif;
  --fm:'DM Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top);
  --sab:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--cr);font-family:var(--fb);color:var(--i1);overscroll-behavior:none;-webkit-overflow-scrolling:touch}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* Typography */
.fd{font-family:var(--fd)}
.fm{font-family:var(--fm)}
.fw7{font-weight:700}.fw8{font-weight:800}
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}.fs14{font-size:14px}
.ci1{color:var(--i1)}.ci2{color:var(--i2)}.ci3{color:var(--i3)}
.cgr{color:var(--gr)}.cam{color:var(--am)}.crd{color:var(--rd)}.cbl{color:var(--bl)}
.upper{text-transform:uppercase;letter-spacing:.08em}
.italic{font-style:italic}

/* Layout */
.page{padding:14px 16px calc(100px + var(--sab));animation:fadeIn .2s ease}
.hdr{background:rgba(250,248,245,.96);border-bottom:1px solid var(--bd);padding:calc(14px + var(--sat)) 18px 12px;position:sticky;top:0;z-index:30;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--i1)}
.logo-sub{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.nav{display:flex;background:var(--cr);border-radius:14px;padding:3px;gap:2px}
.nb{flex:1;padding:9px 4px;border:none;border-radius:11px;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:var(--i3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--fb)}
.nb.on{font-weight:700;background:var(--wh);color:var(--i1);box-shadow:0 1px 6px var(--sh)}

/* Cards */
.card{background:var(--wh);border-radius:20px;border:1px solid var(--bd);padding:18px;margin-bottom:10px;box-shadow:0 2px 14px var(--sh)}
.card-cr{background:var(--cr)}
.sl{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--i3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.sl-gr{color:var(--gr)}.sl-bl{color:var(--bl)}.sl-am{color:var(--am)}

/* Plant card */
.pc{background:var(--wh);border-radius:20px;border:1px solid var(--bd);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 14px var(--sh);display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s,box-shadow .1s}
.pc:active{transform:scale(.98);box-shadow:0 1px 6px var(--sh)}
.pc-line{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pc-ico{font-size:34px;width:52px;height:52px;background:var(--cr);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pc-info{flex:1;min-width:0}
.pc-name{font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:-.01em;margin-bottom:3px}
.pc-sp{font-size:12px;color:var(--i3);font-style:italic;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Badges */
.vb{display:inline-flex;align-items:center;gap:5px;border-radius:100px;padding:3px 9px;font-size:12px;font-weight:700;font-family:var(--fb)}
.vb.lg{font-size:13px;padding:5px 13px}
.vb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vb.lg .vb-dot{width:8px;height:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:100px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;gap:6px;font-family:var(--fb)}
.btn:active{transform:scale(.95)}
.btn-p{background:var(--gr);color:#fff;box-shadow:0 4px 14px rgba(45,106,79,.3)}
.btn-s{background:var(--wh);color:var(--i1);border:1.5px solid var(--bd)}
.btn-w{background:#fef2f2;color:var(--rd);border:1.5px solid #fecaca}
.btn-g{background:transparent;color:var(--i3);border:none;box-shadow:none;padding:6px 10px}
.btn-bl{background:#dbeafe;color:var(--bl);border:none}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-full{width:100%}
.btn-icon{padding:10px;border-radius:50%}

/* FAB */
.fab{position:fixed;bottom:calc(76px + var(--sab));right:20px;width:56px;height:56px;border-radius:50%;background:var(--gr);border:none;cursor:pointer;font-size:24px;color:#fff;box-shadow:0 6px 24px rgba(45,106,79,.4);z-index:25;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.fab:active{transform:scale(.9)}
.safe-bottom{position:fixed;bottom:0;left:0;right:0;height:calc(66px + var(--sab));background:var(--pa);border-top:1px solid var(--bd);max-width:430px;margin:0 auto;z-index:28}

/* Forms */
.fg{margin-bottom:14px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
label{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--i3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;background:var(--pa);border:1.5px solid var(--bd);border-radius:12px;padding:11px 13px;color:var(--i1);outline:none;font-family:var(--fb);font-size:16px;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gr)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{padding:11px;border:1.5px solid var(--bd);border-radius:12px;background:var(--pa);cursor:pointer;font-weight:600;font-size:14px;font-family:var(--fb);transition:all .15s;text-align:center}
.tbtn.on{border-color:var(--gr);background:var(--gx);color:var(--gr)}
.eg{display:flex;gap:6px;flex-wrap:wrap}
.eb{font-size:22px;width:42px;height:42px;background:var(--cr);border:1.5px solid var(--bd);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eb.on{border-color:var(--gr);background:var(--gx)}

/* Sheet */
.ov{position:fixed;inset:0;background:rgba(26,26,24,.45);z-index:50;display:flex;align-items:flex-end;animation:fadeIn .15s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sb{background:var(--pa);border-radius:28px 28px 0 0;padding:0 20px calc(40px + var(--sab));width:100%;max-width:430px;margin:0 auto;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(26,26,24,.15);animation:slideUp .25s ease;-webkit-overflow-scrolling:touch}
.sh{width:40px;height:4px;background:var(--bd);border-radius:4px;margin:14px auto 20px;display:block}
.shdr{position:sticky;top:0;background:var(--pa);padding:4px 0 16px;z-index:2}
.st{font-family:var(--fd);font-size:22px;font-weight:800}

/* Toast */
.toast{position:fixed;top:max(20px,var(--sat));left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:13px;z-index:200;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:slideUp .2s ease;pointer-events:none;font-family:var(--fb)}
.toast-w{background:var(--rd)}
.toast-i{background:var(--bl)}

/* Alerts */
.alert{border-radius:18px;padding:14px 16px;margin-bottom:10px}
.alert-y{background:#fffbeb;border:1.5px solid #fde68a}
.alert-b{background:#eff6ff;border:1.5px solid #bfdbfe}
.alert-g{background:#f0faf4;border:1.5px solid var(--gx)}
.ar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ar:last-child{margin-bottom:0}

/* Info cells */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:var(--cr);border-radius:12px;padding:11px}
.ic-l{font-family:var(--fm);font-size:10px;color:var(--i3);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.ic-v{font-size:13px;font-weight:600}

/* Stats */
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb2{background:var(--wh);border-radius:16px;border:1px solid var(--bd);padding:14px;text-align:center;box-shadow:0 2px 8px var(--sh)}
.sn{font-family:var(--fd);font-size:24px;font-weight:800;line-height:1}

/* Hero */
.hero{position:relative;overflow:hidden}
.hero-bg{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;opacity:.5}
.hero-ico{font-size:50px;width:70px;height:70px;background:var(--cr);border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Tabs */
.tabs{display:flex;background:var(--cr);border-radius:14px;padding:4px;gap:2px;margin-bottom:14px}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--i3);transition:all .15s;font-family:var(--fb)}
.tab.on{font-weight:700;background:var(--wh);color:var(--i1);box-shadow:0 1px 4px var(--sh)}

/* Row items */
.ri{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.ri:last-child{border-bottom:none}

/* Progress */
.pr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pt{flex:1;height:6px;background:var(--cr);border-radius:6px;overflow:hidden}
.pf{height:100%;border-radius:6px}

/* Pills */
.pill{display:inline-block;background:var(--gx);color:var(--gr);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:600;margin:0 4px 4px 0}

/* Quote */
.quote{font-size:13px;color:var(--i3);font-style:italic;border-left:3px solid var(--gl);padding-left:12px;margin-top:10px}

/* Score bar */
.sbt{height:6px;background:var(--cr);border-radius:10px;overflow:hidden;margin-top:4px}
.sbf{height:100%;border-radius:10px;transition:width .6s}

/* Map */
#map{width:100%;height:260px;border-radius:14px;overflow:hidden;z-index:1}
.map-card{position:relative}
.map-overlay-btn{position:absolute;top:10px;right:10px;z-index:400;background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px var(--sh);font-family:var(--fb);color:var(--i1)}
.wx-chip{position:absolute;bottom:10px;left:10px;right:10px;z-index:400;background:rgba(250,248,245,.95);border-radius:12px;padding:10px 14px;backdrop-filter:blur(10px);box-shadow:0 2px 12px var(--sh);display:flex;align-items:center;gap:10px}

/* Weather card */
.wx-card{background:linear-gradient(135deg,#e8f5e9,#f0faf4);border-radius:20px;border:1px solid #c8e6c9;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 14px var(--sh)}

/* AI box */
.ai-box{background:linear-gradient(135deg,#f5f3ff,#faf8ff);border:1.5px solid #e9d5ff;border-radius:16px;padding:16px;margin-bottom:20px}
.ai-r{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}

/* Sparkline */
.spark{width:100%;height:44px;overflow:visible}

/* Misc flex */
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.ac{align-items:center}.jb{justify-content:space-between}.f1{flex:1}
.tc{text-align:center}.tr{text-align:right}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.empty{text-align:center;padding:40px 20px}
.empty-em{font-size:52px;margin-bottom:14px}
.empty-t{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:8px}
.empty-s{font-size:14px;color:var(--i3);margin-bottom:20px}
select option{background:var(--pa);color:var(--i1)}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const SK='plantai_v4';
const WDAYS={'Cada día':1,'Cada 2 días':2,'2× semana':3,'1× semana':7,'Cada 2 semanas':14,'Mensual':30};
const VIT={
  'óptimo':  {label:'Óptimo',  color:'#2d6a4f',bg:'#d8f3dc',dot:'#52b788'},
  'bueno':   {label:'Bueno',   color:'#386641',bg:'#e9f5db',dot:'#6a994e'},
  'atención':{label:'Atención',color:'#bc6c25',bg:'#fef3c7',dot:'#f59e0b'},
  'crítico': {label:'Crítico', color:'#9b2226',bg:'#fee2e2',dot:'#ef4444'},
};
const EMOJIS=['🌿','🌱','🌵','🌸','🍀','🌴','🌾','🍃','🌺','🪴','🌻','🍅','🌳','🎋','🪷','🌼','🫧','🪸'];
const LIGHTS=['Pleno sol','Sol directo','Indirecta brillante','Indirecta','Semi-sombra','Sombra'];
const WATERS=Object.keys(WDAYS);
const FERTS=['Semanal','Quincenal','Mensual','Cada 2 meses','Estacional','Nunca'];
const WEMOJI={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'⛈',71:'🌨',80:'🌦',81:'🌧',82:'⛈',95:'⛈'};
const WTXT={0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',45:'Niebla',51:'Llovizna',53:'Llovizna moderada',55:'Llovizna intensa',61:'Lluvia ligera',63:'Lluvia',65:'Lluvia intensa',71:'Nieve ligera',80:'Chubascos',81:'Chubascos moderados',82:'Chubascos fuertes',95:'Tormenta'};
const CHKINT={'Cada día':3,'Cada 2 días':3,'2× semana':5,'1× semana':7,'Cada 2 semanas':10,'Mensual':14};
const SEASONS=['Invierno','Invierno','Primavera','Primavera','Primavera','Verano','Verano','Verano','Otoño','Otoño','Otoño','Invierno'];
const DEMO=[
  {id:'p1',name:'Monstera',icon:'🌿',species:'Monstera deliciosa',location:'Salón',outdoor:false,pot:'25cm terracota',soil:'Universal + perlita',acquired:'2023-03-15',watering:'1× semana',sunlight:'Indirecta brillante',fertilizer:'Mensual',vitality:'óptimo',notes:'Fenestración espectacular.',lastWatered:'2024-03-08',nextWatering:'2024-03-15',lastCheck:null,nextCheck:td(),checkHistory:[],entries:[{id:'e1',date:'2024-01-10',height:45,leaves:12,note:'Nueva hoja brotando',vitality:'óptimo'},{id:'e2',date:'2024-02-14',height:52,leaves:14,note:'Hoja fenestrada nueva',vitality:'óptimo'},{id:'e3',date:'2024-03-08',height:58,leaves:16,note:'Crecimiento explosivo',vitality:'óptimo'}],tags:['interior','tropical']},
  {id:'p2',name:'San Pedro',icon:'🌵',species:'Echinopsis pachanoi',location:'Balcón',outdoor:true,pot:'15cm cerámica',soil:'Suculentas',acquired:'2023-07-20',watering:'Cada 2 semanas',sunlight:'Pleno sol',fertilizer:'Estacional',vitality:'bueno',notes:'Muy resistente.',lastWatered:'2024-03-01',nextWatering:'2024-03-15',lastCheck:null,nextCheck:td(),checkHistory:[],entries:[{id:'e4',date:'2024-01-05',height:28,leaves:0,note:'Verde intenso',vitality:'bueno'}],tags:['exterior','cactus']},
];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function td(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function daysAgo(d){return d?Math.floor((Date.now()-new Date(d))/864e5):999;}
function daysUntil(d){return d?Math.ceil((new Date(d)-Date.now())/864e5):null;}
function fmt(s){return s?new Date(s).toLocaleDateString('es-ES',{day:'numeric',month:'short'}):'—';}
function fmtL(s){return s?new Date(s).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}):'—';}
function season(){return SEASONS[new Date().getMonth()];}
function qs(s){return document.querySelector(s);}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let S;
function loadS(){
  try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{plants:DEMO,settings:{rainMm:8,apiKey:'',homeLocation:null}};}
  catch{return{plants:DEMO,settings:{rainMm:8,apiKey:'',homeLocation:null}};}
}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch{}}
S=loadS();

let page='home',selId=null,activeTab='ficha',activeSheet=null;
let weather=null,wxState='idle';
let aiState='idle',aiIdent=null;
let checkState='idle',checkResult=null;
let search='',leafMap=null,homeMarker=null,wxMarker=null;
let _fp={},_fe={};
const BP=()=>({name:'',icon:'🌿',species:'',location:'',outdoor:false,pot:'',soil:'',acquired:td(),watering:'1× semana',sunlight:'Indirecta brillante',fertilizer:'Mensual',vitality:'bueno',notes:'',tags:''});
const BE=()=>({date:td(),height:'',leaves:'',note:'',vitality:'bueno'});
_fp=BP();_fe=BE();

// ═══════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='cls')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='for')e.htmlFor=v;
    else if(k[0]==='$')e.addEventListener(k.slice(1),v);
    else if(k==='val'){e.value=v;}
    else e.setAttribute(k,v);
  }
  for(const c of ch.flat()){
    if(c==null||c===false||c===undefined)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return e;
}
function svgEl(tag,attrs,...ch){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);
  for(const c of ch.flat()){if(c)e.appendChild(c);}
  return e;
}
function div(cls,...ch){return el('div',{cls},...ch);}
function span(cls,...ch){return el('span',{cls},...ch);}
function btn(label,cls,cb,extra={}){return el('button',{cls:'btn '+cls,$click:cb,...extra},label);}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let _tst=null,_tTimer=null;
function toast(msg,type='ok'){
  if(_tst)_tst.remove();
  _tst=el('div',{cls:'toast'+(type==='w'?' toast-w':type==='i'?' toast-i':'')},msg);
  document.getElementById('app').appendChild(_tst);
  clearTimeout(_tTimer);
  _tTimer=setTimeout(()=>{if(_tst){_tst.remove();_tst=null;}},3000);
}

// ═══════════════════════════════════════════
// WEATHER — open-meteo (free, no key needed)
// ═══════════════════════════════════════════
function fetchWeather(){
  wxState='loading';render();
  if(!navigator.geolocation){wxState='error';render();return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weathercode,windspeed_10m,precipitation&daily=precipitation_sum&timezone=auto&forecast_days=1`);
      const j=await r.json();
      let city='Tu ubicación';
      try{
        const g=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
        const gj=await g.json();
        city=gj.address?.city||gj.address?.town||gj.address?.village||gj.address?.municipality||city;
      }catch{}
      const rain=j.daily?.precipitation_sum?.[0]??j.current?.precipitation??0;
      weather={temp:Math.round(j.current.temperature_2m),code:j.current.weathercode,humidity:j.current.relative_humidity_2m,wind:Math.round(j.current.windspeed_10m),rain,city,lat,lon};
      // Save home location if not set
      if(!S.settings.homeLocation){
        S.settings.homeLocation={lat,lon,city};saveS();
      }
      // Auto-water outdoor plants if enough rain
      const thresh=S.settings.rainMm||8;
      if(rain>=thresh){
        S.plants=S.plants.map(p=>{
          if(!p.outdoor)return p;
          const days=WDAYS[p.watering]||7;
          const nxt=new Date();nxt.setDate(nxt.getDate()+days);
          return{...p,lastWatered:td(),nextWatering:nxt.toISOString().split('T')[0]};
        });
        saveS();
        toast(`🌧️ ${rain}mm de lluvia — plantas exteriores regadas`,'i');
      }
      wxState='ok';
    }catch(e){wxState='error';}
    render();
  },()=>{wxState='error';render();});
}

// PLANT ACTIONS
// ═══════════════════════════════════════════
function waterPlant(id){
  S.plants=S.plants.map(p=>{
    if(p.id!==id)return p;
    if(p.lastWatered===td()){toast('Ya fue regada hoy','w');return p;}
    const days=WDAYS[p.watering]||7;
    const nxt=new Date();nxt.setDate(nxt.getDate()+days);
    return{...p,lastWatered:td(),nextWatering:nxt.toISOString().split('T')[0]};
  });
  saveS();toast('💧 Riego registrado');render();
}

function deletePlant(id){
  S.plants=S.plants.filter(p=>p.id!==id);
  saveS();selId=null;page='list';
  toast('Planta eliminada','w');render();
}

function addPlant(){
  if(!_fp.name.trim()){toast('El nombre es obligatorio','w');return;}
  const ci=CHKINT[_fp.watering]||7;
  const nc=new Date();nc.setDate(nc.getDate()+ci);
  const p={..._fp,id:uid(),tags:_fp.tags.split(',').map(t=>t.trim()).filter(Boolean),entries:[],checkHistory:[],lastCheck:null,nextCheck:nc.toISOString().split('T')[0],lastWatered:null,nextWatering:null};
  S.plants.push(p);saveS();
  activeSheet=null;_fp=BP();aiState='idle';aiIdent=null;
  toast('🌱 Planta añadida');render();
}

function addEntry(){
  if(!_fe.date||!selId)return;
  const entry={..._fe,id:uid(),height:Number(_fe.height)||0,leaves:Number(_fe.leaves)||0};
  S.plants=S.plants.map(p=>{
    if(p.id!==selId)return p;
    const entries=[...(p.entries||[]),entry].sort((a,b)=>new Date(a.date)-new Date(b.date));
    return{...p,entries};
  });
  saveS();activeSheet=null;_fe=BE();toast('📊 Registro guardado');render();
}

// AI — Anthropic API (needs key)
// ═══════════════════════════════════════════
function getApiKey(){return S.settings.apiKey||'';}

async function identifyPlant(file){
  if(!file)return;
  const key=getApiKey();
  if(!key){toast('⚠️ Configura tu API key en Ajustes','w');return;}
  aiState='loading';aiIdent=null;render();
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const mt=file.type||'image/jpeg';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:900,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:b64}},
        {type:'text',text:`Identifica esta planta. Responde SOLO JSON válido sin markdown:\n{"commonName":"nombre en español","scientificName":"nombre científico","family":"familia","confidence":"alta|media|baja","icon":"emoji representativo","care":{"watering":"frecuencia riego","sunlight":"tipo luz","fertilizer":"frecuencia abono","difficulty":"fácil|moderado|difícil"},"description":"descripción breve 2 frases","tips":["tip1","tip2","tip3"],"toxic":false}`}
      ]}]})
    });
    const j=await resp.json();
    if(j.error){toast('Error API: '+j.error.message,'w');aiState='error';render();return;}
    const txt=j.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const result=JSON.parse(txt);
    aiIdent=result;aiState='done';
    _fp={..._fp,name:result.commonName||_fp.name,species:result.scientificName||_fp.species,icon:result.icon||_fp.icon,notes:result.description||_fp.notes};
  }catch(e){aiState='error';toast('Error identificando la planta','w');}
  render();
}

async function runCheck(plantId){
  const p=S.plants.find(x=>x.id===plantId);
  if(!p)return;
  const key=getApiKey();
  if(!key){toast('⚠️ Configura tu API key en Ajustes','w');return;}
  selId=plantId;checkState='loading';checkResult=null;activeSheet='check';render();
  const last=p.entries?.[p.entries.length-1];
  const dw=daysAgo(p.lastWatered);
  const dn=daysUntil(p.nextWatering);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:700,messages:[{role:'user',content:`Eres botánico experto. Analiza el estado de esta planta.\n\nPlanta: ${p.name} (${p.species||'?'})\nUbicación: ${p.location} (${p.outdoor?'exterior':'interior'})\nRiego: ${p.watering} | Último hace ${dw}d | ${dn!==null?(dn<=0?`RETRASO ${Math.abs(dn)}d`:`próximo en ${dn}d`):''}\nLuz: ${p.sunlight} | Fertilizante: ${p.fertilizer}\nTemporada: ${season()}\nÚltimo estado: ${last?`${last.height}cm, ${last.leaves} hojas, ${last.vitality}, "${last.note}"`:'sin registros'}\nNotas: ${p.notes||'ninguna'}\n\nResponde SOLO JSON:\n{"vitality":"óptimo|bueno|atención|crítico","score":85,"headline":"frase muy corta","diagnosis":"2-3 frases","actions":[{"priority":"alta|media|baja","action":"acción concreta"}],"nextCheckDays":7,"positives":["positivo1","positivo2"]}`}]})
    });
    const j=await resp.json();
    if(j.error){toast('Error API: '+j.error.message,'w');checkState='error';render();return;}
    const txt=j.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const result=JSON.parse(txt);
    checkResult=result;checkState='done';
    const nc=new Date();nc.setDate(nc.getDate()+(result.nextCheckDays||7));
    S.plants=S.plants.map(pp=>{
      if(pp.id!==plantId)return pp;
      return{...pp,vitality:result.vitality,lastCheck:td(),nextCheck:nc.toISOString().split('T')[0],checkHistory:[...(pp.checkHistory||[]),{date:td(),vitality:result.vitality,score:result.score,headline:result.headline}].slice(-10)};
    });
    saveS();
  }catch(e){checkState='error';toast('Error en el análisis','w');}
  render();
}

function closeSheet(){activeSheet=null;render();}

// MAP — Leaflet + OpenStreetMap (free, no key)
// ═══════════════════════════════════════════
function initMap(container){
  if(leafMap){leafMap.remove();leafMap=null;}
  const loc=S.settings.homeLocation;
  const center=loc?[loc.lat,loc.lon]:[40.4168,-3.7038];// Madrid default
  leafMap=L.map(container,{zoomControl:true,attributionControl:false}).setView(center,13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(leafMap);

  // Home marker
  if(loc){
    const homeIcon=L.divIcon({html:'<div style="background:#2d6a4f;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(45,106,79,.4);border:2px solid #fff">🏠</div>',iconSize:[36,36],iconAnchor:[18,18],className:''});
    homeMarker=L.marker([loc.lat,loc.lon],{icon:homeIcon}).addTo(leafMap);
    homeMarker.bindPopup(`<b>${loc.city||'Mi casa'}</b><br>Toca para ver el tiempo`);
  }

  // Weather marker if available
  if(weather){
    const wxIcon=L.divIcon({html:`<div style="background:#fff;border:1.5px solid #e8e4dc;border-radius:12px;padding:6px 10px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 2px 10px rgba(26,26,24,.1);white-space:nowrap">${WEMOJI[weather.code]||'🌡️'} ${weather.temp}°C</div>`,iconSize:[80,36],iconAnchor:[40,18],className:''});
    if(wxMarker)wxMarker.remove();
    wxMarker=L.marker([weather.lat||center[0],weather.lon||center[1]],{icon:wxIcon}).addTo(leafMap);
    wxMarker.bindPopup(`<b>${WTXT[weather.code]||''}</b><br>💧 ${weather.humidity}% · 💨 ${weather.wind}km/h${weather.rain>0?`<br>🌧️ ${weather.rain}mm hoy`:''}`);
  }

  // Click to set home
  leafMap.on('click',e=>{
    const{lat,lng}=e.latlng;
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=es`)
      .then(r=>r.json()).then(gj=>{
        const city=gj.address?.city||gj.address?.town||gj.address?.village||gj.address?.municipality||'Mi casa';
        S.settings.homeLocation={lat,lon:lng,city};saveS();
        toast('📍 Casa guardada: '+city);
        initMap(container);
      }).catch(()=>{
        S.settings.homeLocation={lat,lon:lng,city:'Mi casa'};saveS();
        toast('📍 Ubicación guardada');
        initMap(container);
      });
  });
}

// ═══════════════════════════════════════════
// SPARKLINE
// ═══════════════════════════════════════════
function sparkline(entries){
  if(!entries||entries.length<2)return null;
  const W=280,H=50;
  const hs=entries.map(e=>e.height||0);
  const mx=Math.max(...hs),mn=Math.min(...hs),rng=mx-mn||1;
  const pts=entries.map((e,i)=>[(i/(entries.length-1))*(W-8)+4,H-4-((e.height-mn)/rng)*(H-10)]);
  const d=pts.map(([x,y],i)=>`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'spark'});
  // Fill area
  const fp_pts=`${pts.map(([x,y])=>`${x},${y}`).join(' ')} ${pts[pts.length-1][0]},${H} ${pts[0][0]},${H}`;
  svg.appendChild(svgEl('polygon',{points:fp_pts,fill:'rgba(45,106,79,.08)'}));
  svg.appendChild(svgEl('path',{d,fill:'none',stroke:'#2d6a4f','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'}));
  pts.forEach(([x,y],i)=>{
    svg.appendChild(svgEl('circle',{cx:x,cy:y,r:i===pts.length-1?'4':'3',fill:i===pts.length-1?'#2d6a4f':'#fff',stroke:'#2d6a4f','stroke-width':'2'}));
  });
  return svg;
}

// RENDER
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  // Preserve toast
  const existing_toast=app.querySelector('.toast');
  app.innerHTML='';
  if(existing_toast)app.appendChild(existing_toast);
  app.appendChild(buildHeader());
  const pageEl=el('div',{cls:'page'});
  if(page==='home')pageEl.appendChild(buildHome());
  else if(page==='list')pageEl.appendChild(buildList());
  else if(page==='detail')pageEl.appendChild(buildDetail());
  else if(page==='stats')pageEl.appendChild(buildStats());
  else if(page==='map')pageEl.appendChild(buildMapPage());
  else if(page==='settings')pageEl.appendChild(buildSettings());
  app.appendChild(pageEl);
  app.appendChild(buildFAB());
  app.appendChild(el('div',{cls:'safe-bottom'}));
  if(activeSheet==='plant')app.appendChild(buildSheetPlant());
  if(activeSheet==='entry')app.appendChild(buildSheetEntry());
  if(activeSheet==='check')app.appendChild(buildSheetCheck());
  // Init map after DOM
  if(page==='map'){
    setTimeout(()=>{
      const mc=document.getElementById('leaflet-map');
      if(mc)initMap(mc);
    },100);
  }
}

// HOME PAGE
// ═══════════════════════════════════════════
function buildHome(){
  const plants=S.plants;
  const needsW=plants.filter(p=>{const d=daysUntil(p.nextWatering);return d!==null&&d<=0;});
  const needsC=plants.filter(p=>{const d=daysUntil(p.nextCheck);return d!==null&&d<=0;});
  const thresh=S.settings.rainMm||8;
  const rainedOut=weather&&weather.rain>=thresh;
  const frag=document.createDocumentFragment();

  // Weather card
  frag.appendChild(buildWeatherCard());

  // Stats
  frag.appendChild(el('div',{cls:'sg3'},
    statBox(plants.length,'Plantas 🌿','var(--i1)'),
    statBox(needsW.length,'Regar 💧',needsW.length>0?'var(--am)':'var(--i1)'),
    statBox(needsC.length,'Revisar 🔬',needsC.length>0?'var(--bl)':'var(--i1)')
  ));

  // Rain info
  if(rainedOut){
    const outdoorP=plants.filter(p=>p.outdoor);
    if(outdoorP.length>0){
      frag.appendChild(el('div',{cls:'alert alert-b'},
        el('div',{cls:'sl sl-bl mb8'},'🌧️ Ha llovido '+weather.rain+'mm hoy'),
        el('div',{cls:'fs12 ci2 mb8'},'Plantas exteriores regadas automáticamente.'),
        el('div',{},...outdoorP.map(p=>el('span',{cls:'pill'},p.icon+' '+p.name)))
      ));
    }
  }

  // Water alerts
  const toW=needsW.filter(p=>!(rainedOut&&p.outdoor));
  if(toW.length>0){
    const box=el('div',{cls:'alert alert-y'},el('div',{cls:'sl sl-am mb8'},'💧 Necesitan agua hoy'));
    toW.forEach(p=>{
      box.appendChild(el('div',{cls:'ar'},
        el('span',{style:{fontSize:'22px'}},p.icon),
        el('span',{cls:'f1 fw7 fs13'},p.name),
        btn('Regar','btn-p btn-sm',e=>{e.stopPropagation();waterPlant(p.id);})
      ));
    });
    frag.appendChild(box);
  }

  // Check alerts (only if API key is set)
  if(needsC.length>0&&getApiKey()){
    const box=el('div',{cls:'alert alert-b'},el('div',{cls:'sl sl-bl mb8'},'🔬 Check de salud pendiente'));
    needsC.forEach(p=>{
      box.appendChild(el('div',{cls:'ar'},
        el('span',{style:{fontSize:'22px'}},p.icon),
        el('span',{cls:'f1 fw7 fs13'},p.name),
        btn('Analizar','btn-bl btn-sm',e=>{e.stopPropagation();runCheck(p.id);})
      ));
    });
    frag.appendChild(box);
  }

  // API key reminder
  if(!getApiKey()){
    frag.appendChild(el('div',{cls:'card',style:{background:'linear-gradient(135deg,#f5f3ff,#faf8ff)',border:'1.5px solid #e9d5ff',cursor:'pointer'},$click:()=>{page='settings';render();}},
      el('div',{cls:'flex ac gap10'},
        el('span',{style:{fontSize:'28px'}},'🤖'),
        el('div',{cls:'f1'},
          el('div',{cls:'fw7 fs13'},'Activa la IA'),
          el('div',{cls:'fs12 ci3'},'Añade tu API key para identificar plantas y hacer análisis de salud → Ajustes')
        ),
        el('span',{cls:'ci3',style:{fontSize:'18px'}},'›')
      )
    ));
  }

  // Plants
  frag.appendChild(el('div',{cls:'flex jb ac mb8',style:{marginTop:'4px'}},
    el('span',{cls:'sl',style:{marginBottom:0}},'Mis plantas'),
    btn('Ver todas →','btn-g fs13 cgr',()=>{page='list';render();},{style:{padding:'4px 0'}})
  ));

  if(plants.length===0){
    frag.appendChild(el('div',{cls:'card empty'},
      el('div',{cls:'empty-em'},'🌱'),
      el('div',{cls:'empty-t'},'Sin plantas aún'),
      el('div',{cls:'empty-s'},'Empieza añadiendo tu primera planta'),
      btn('+ Añadir planta','btn-p',()=>{_fp=BP();aiState='idle';aiIdent=null;activeSheet='plant';render();})
    ));
  }else{
    plants.slice(0,3).forEach(p=>frag.appendChild(buildPlantCard(p)));
    if(plants.length>3) frag.appendChild(btn('Ver las '+plants.length+' plantas →','btn-s btn-full',()=>{page='list';render();},{style:{marginTop:'4px'}}));
  }
  return frag;
}

function buildDetail(){
  const p=S.plants.find(x=>x.id===selId);
  if(!p)return el('div',{},'Planta no encontrada');
  const last=p.entries?.[p.entries.length-1];
  const du=daysUntil(p.nextWatering);
  const checkDue=daysUntil(p.nextCheck)!==null&&daysUntil(p.nextCheck)<=0;
  const vi=VIT[p.vitality]||VIT['bueno'];
  const lastChk=p.checkHistory?.[p.checkHistory.length-1];
  const frag=document.createDocumentFragment();

  // Hero
  const hero=el('div',{cls:'card hero mb12'});

  const heroTop=el('div',{cls:'flex gap10 ac',style:{position:'relative'}});
  heroTop.appendChild(el('div',{cls:'hero-ico'},p.icon));
  const heroInfo=el('div',{cls:'f1'});
  heroInfo.appendChild(el('div',{style:{fontFamily:'var(--fd)',fontSize:'22px',fontWeight:'800',letterSpacing:'-.02em',marginBottom:'4px'}},p.name));
  heroInfo.appendChild(el('div',{cls:'fs13 ci3 italic mb8'},p.species||'—'));
  heroInfo.appendChild(vbadge(p.vitality,true));
  heroTop.appendChild(heroInfo);
  hero.appendChild(heroTop);

  if(lastChk){
    hero.appendChild(el('div',{style:{marginTop:'14px'}},
      el('div',{cls:'flex jb mb4'},
        el('span',{cls:'sl',style:{marginBottom:0}},'PUNTUACIÓN IA'),
        el('span',{cls:'fs11 fw7',style:{color:vi.color}},lastChk.score+'/100')
      ),
      el('div',{cls:'sbt'},el('div',{cls:'sbf',style:{width:lastChk.score+'%',background:vi.dot}}))
    ));
  }

  // Actions
  const waterBtnLabel='💧 Regar'+(p.lastWatered===td()?' (hoy ✓)':'');
  const actions=el('div',{cls:'flex gap8 mt14'});
  const wbtn=btn(waterBtnLabel,'btn-p f1 fs13',()=>{
    if(p.lastWatered===td()){toast('Ya fue regada hoy','w');return;}
    waterPlant(p.id);
  });
  actions.appendChild(wbtn);
  const cbtn=btn('🔬 '+(checkDue?'Check pendiente':'Analizar'),'btn-s f1 fs13',()=>runCheck(p.id));
  if(checkDue){cbtn.style.background='#eff6ff';cbtn.style.color='var(--bl)';cbtn.style.borderColor='#bfdbfe';}
  if(!getApiKey()){cbtn.title='Configura tu API key en Ajustes';cbtn.style.opacity='0.5';}
  actions.appendChild(cbtn);
  hero.appendChild(actions);
  frag.appendChild(hero);

  // Tabs
  frag.appendChild(el('div',{cls:'tabs'},
    ...['ficha','historial','crecimiento','cuidados'].map(t=>
      el('button',{cls:'tab'+(activeTab===t?' on':''),$click:()=>{activeTab=t;render();}},t[0].toUpperCase()+t.slice(1))
    )
  ));

  if(activeTab==='ficha')frag.appendChild(buildTabFicha(p,last,du,vi));
  else if(activeTab==='historial')frag.appendChild(buildTabHistorial(p));
  else if(activeTab==='crecimiento')frag.appendChild(buildTabCrecimiento(p));
  else if(activeTab==='cuidados')frag.appendChild(buildTabCuidados(p));
  return frag;
}

function buildTabCrecimiento(p){
  const frag=document.createDocumentFragment();

  });
  frag.appendChild(vitCard);

  const locCard=el('div',{cls:'card'},el('div',{cls:'sl'},'Por ubicación'));
  byL.forEach(([l,c])=>locCard.appendChild(el('div',{cls:'ri'},el('span',{cls:'f1 fs13 ci2'},l),el('span',{cls:'fw7 cgr'},String(c)))));

  const wCard=el('div',{cls:'card'},el('div',{cls:'sl'},'Próximos riegos'));

  const fab=el('button',{cls:'fab',$click:()=>{_fp=BP();aiState='idle';aiIdent=null;activeSheet='plant';render();}},'＋');
  // Settings gear in corner
  const gear=el('button',{style:{position:'fixed',bottom:'calc(76px + var(--sab))',left:'20px',width:'44px',height:'44px',borderRadius:'50%',background:'var(--wh)',border:'1px solid var(--bd)',cursor:'pointer',fontSize:'18px',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px var(--sh)',zIndex:25},$click:()=>{page='settings';render();}},'⚙️');
  const wrapper=document.createDocumentFragment();
  wrapper.appendChild(gear);
  wrapper.appendChild(fab);
  return wrapper;
}

// ═══════════════════════════════════════════
// SHEETS
// ═══════════════════════════════════════════
function buildSheetPlant(){
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov)closeSheet();}});
  const sb=el('div',{cls:'sb'});

  const shdr=el('div',{cls:'shdr'},
    el('span',{cls:'sh'}),
    el('div',{cls:'flex jb ac'},
      el('div',{cls:'st'},'Nueva planta'),
      btn('×','btn-g',closeSheet,{style:{fontSize:'22px',padding:'4px 8px',color:'var(--i3)'}})
    )
  );
  sb.appendChild(shdr);

  // AI identify box
  const aiBox=el('div',{cls:'ai-box'});
  aiBox.appendChild(el('div',{cls:'ai-label'},'🤖 Identificar con IA'));
  if(!getApiKey()){
    aiBox.appendChild(el('div',{cls:'fs12 ci3',style:{marginBottom:'8px'}},'Configura tu API key en ⚙️ Ajustes para usar esta función.'));
  }else if(aiState==='idle'){
    aiBox.appendChild(el('div',{cls:'fs13 ci3',style:{marginBottom:'10px'}},'Haz una foto y la IA identificará la planta y rellenará los datos automáticamente.'));
  }else if(aiState==='loading'){
    aiBox.appendChild(el('div',{style:{fontSize:'13px',color:'#7c3aed',marginBottom:'10px'}},'🔍 Analizando imagen…'));
  }else if(aiState==='done'&&aiIdent){
    const res=el('div',{cls:'ai-r'},
      el('div',{style:{fontFamily:'var(--fd)',fontWeight:'800',fontSize:'16px',marginBottom:'3px'}},aiIdent.icon+' '+aiIdent.commonName),
      el('div',{cls:'fs12 ci3 italic',style:{marginBottom:'6px'}},aiIdent.scientificName),
      el('div',{cls:'fs12 ci2',style:{lineHeight:'1.6',marginBottom:'8px'}},aiIdent.description),
      el('div',{cls:'flex gap8',style:{flexWrap:'wrap'}},
        el('span',{cls:'pill',style:{background:'#f0fdf4',color:'#166534'}},'Confianza: '+aiIdent.confidence),
        aiIdent.toxic?el('span',{cls:'pill',style:{background:'#fef2f2',color:'var(--rd)'}},'⚠️ Tóxica'):null,
        el('span',{cls:'pill',style:{background:'#f0f9ff',color:'#0369a1'}},aiIdent.care?.difficulty||'')
      )
    );
    if(aiIdent.tips){const ul=el('ul',{style:{margin:'10px 0 0',paddingLeft:'16px',fontSize:'12px',color:'var(--i3)',lineHeight:'1.7'}});aiIdent.tips.forEach(t=>ul.appendChild(el('li',{},t)));res.appendChild(ul);}
    res.appendChild(el('div',{cls:'fs11 fw7 cgr fm mt8'},'✓ DATOS RELLENADOS AUTOMÁTICAMENTE'));
    aiBox.appendChild(res);
  }
  const fi=el('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
  fi.addEventListener('change',e=>identifyPlant(e.target.files?.[0]));
  const pb=el('label',{cls:'btn btn-s btn-full',style:{cursor:'pointer'}},
    '📷 '+(aiState==='loading'?'Analizando…':'Subir o tomar foto'),fi
  );
  if(!getApiKey()){pb.style.opacity='0.5';pb.style.pointerEvents='none';}
  aiBox.appendChild(pb);
  sb.appendChild(aiBox);

  // Form
  let nameEl,specEl,locEl,potEl,soilEl,waterEl,lightEl,fertEl,vitEl,dateEl,notesEl,tagsEl;

  function fg(lbl,inputEl){return el('div',{cls:'fg'},el('label',{},lbl),inputEl);}
  function fgs(lbl,inputEl){return el('div',{},el('label',{},lbl),inputEl);}
  function sel(opts,val,cb){const s=el('select',{},...opts.map(o=>el('option',{value:o},o)));s.value=val;s.addEventListener('change',e=>cb(e.target.value));return s;}

  sb.appendChild(fg('Nombre *', nameEl=el('input',{type:'text',placeholder:'Ej: Mi Monstera',val:_fp.name})));
  nameEl.addEventListener('input',e=>_fp.name=e.target.value);

  // Emoji grid
  const eg=el('div',{cls:'fg'},el('label',{},'Icono'),el('div',{cls:'eg'}));
  EMOJIS.forEach(em=>{
    const eb=el('div',{cls:'eb'+(em===_fp.icon?' on':''),$click:()=>{_fp.icon=em;eg.querySelectorAll('.eb').forEach(b=>b.classList.remove('on'));eb.classList.add('on');}},em);
    eg.querySelector('.eg').appendChild(eb);
  });
  sb.appendChild(eg);

  const g1=el('div',{cls:'fg2'});
  g1.appendChild(fgs('Especie', specEl=el('input',{type:'text',placeholder:'Nombre científico',val:_fp.species})));
  specEl.addEventListener('input',e=>_fp.species=e.target.value);
  g1.appendChild(fgs('Ubicación', locEl=el('input',{type:'text',placeholder:'Salón, balcón…',val:_fp.location})));
  locEl.addEventListener('input',e=>_fp.location=e.target.value);
  sb.appendChild(g1);

  const togDiv=el('div',{cls:'fg'},el('label',{},'Tipo'),el('div',{cls:'trow'}));
  [false,true].forEach(v=>{
    const tb=el('button',{cls:'tbtn'+(_fp.outdoor===v?' on':''),$click:()=>{_fp.outdoor=v;togDiv.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));tb.classList.add('on');}},v?'🌿 Exterior':'🏠 Interior');
    togDiv.querySelector('.trow').appendChild(tb);
  });
  sb.appendChild(togDiv);

  const g2=el('div',{cls:'fg2'});
  g2.appendChild(fgs('Maceta', potEl=el('input',{type:'text',placeholder:'Tamaño/material',val:_fp.pot})));
  potEl.addEventListener('input',e=>_fp.pot=e.target.value);
  g2.appendChild(fgs('Sustrato', soilEl=el('input',{type:'text',placeholder:'Tipo de tierra',val:_fp.soil})));
  soilEl.addEventListener('input',e=>_fp.soil=e.target.value);
  sb.appendChild(g2);

  const g3=el('div',{cls:'fg2'});
  g3.appendChild(fgs('Riego', waterEl=sel(WATERS,_fp.watering,v=>_fp.watering=v)));
  g3.appendChild(fgs('Luz', lightEl=sel(LIGHTS,_fp.sunlight,v=>_fp.sunlight=v)));
  sb.appendChild(g3);

  const g4=el('div',{cls:'fg2'});
  g4.appendChild(fgs('Fertilizante', fertEl=sel(FERTS,_fp.fertilizer,v=>_fp.fertilizer=v)));
  g4.appendChild(fgs('Vitalidad', vitEl=sel(Object.keys(VIT).map(k=>VIT[k].label),VIT[_fp.vitality]?.label||'Bueno',v=>{const k=Object.keys(VIT).find(k=>VIT[k].label===v)||'bueno';_fp.vitality=k;})));
  sb.appendChild(g4);

  sb.appendChild(fg('Fecha adquisición', dateEl=el('input',{type:'date',val:_fp.acquired})));
  dateEl.addEventListener('change',e=>_fp.acquired=e.target.value);

  sb.appendChild(fg('Notas', notesEl=el('textarea',{placeholder:'Observaciones, historia…'},_fp.notes||'')));
  notesEl.addEventListener('input',e=>_fp.notes=e.target.value);

  sb.appendChild(fg('Etiquetas (coma)', tagsEl=el('input',{type:'text',placeholder:'interior, tropical, favorita',val:_fp.tags||''})));
  tagsEl.addEventListener('input',e=>_fp.tags=e.target.value);

  sb.appendChild(el('div',{cls:'fg2',style:{gridTemplateColumns:'1fr 2fr'}},
    btn('Cancelar','btn-s',closeSheet),
    btn('🌱 Añadir planta','btn-p',()=>{
      _fp.name=nameEl.value;_fp.species=specEl.value;_fp.location=locEl.value;
      _fp.pot=potEl.value;_fp.soil=soilEl.value;_fp.tags=tagsEl.value;_fp.notes=notesEl.value;
      addPlant();
    })
  ));

  ov.appendChild(sb);return ov;
}

function buildSheetEntry(){
  const p=S.plants.find(x=>x.id===selId);
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov)closeSheet();}});
  const sb=el('div',{cls:'sb'});
  sb.appendChild(el('div',{cls:'shdr'},
    el('span',{cls:'sh'}),
    el('div',{cls:'st'},'Registrar crecimiento'),
    p?el('div',{cls:'fs13 ci3',style:{marginTop:'4px'}},p.icon+' '+p.name):null
  ));

  function fg(lbl,inputEl){return el('div',{cls:'fg'},el('label',{},lbl),inputEl);}

  const dateEl=el('input',{type:'date',val:_fe.date});dateEl.addEventListener('change',e=>_fe.date=e.target.value);
  sb.appendChild(fg('Fecha',dateEl));

  const g=el('div',{cls:'fg2'});
  const hEl=el('input',{type:'number',placeholder:'0',val:_fe.height||''});hEl.addEventListener('input',e=>_fe.height=e.target.value);
  const lEl=el('input',{type:'number',placeholder:'0',val:_fe.leaves||''});lEl.addEventListener('input',e=>_fe.leaves=e.target.value);
  g.appendChild(el('div',{},el('label',{},'Altura (cm)'),hEl));
  g.appendChild(el('div',{},el('label',{},'Nº hojas'),lEl));
  sb.appendChild(g);

  const vitEl=el('select',{},...Object.keys(VIT).map(k=>el('option',{value:k},VIT[k].label)));
  vitEl.value=_fe.vitality;vitEl.addEventListener('change',e=>_fe.vitality=e.target.value);
  sb.appendChild(fg('Vitalidad',vitEl));

  const noteEl=el('textarea',{placeholder:'Nueva hoja, color, plagas, raíces…'},_fe.note||'');
  noteEl.addEventListener('input',e=>_fe.note=e.target.value);
  sb.appendChild(fg('Observaciones',noteEl));

  sb.appendChild(el('div',{cls:'fg2',style:{gridTemplateColumns:'1fr 2fr'}},
    btn('Cancelar','btn-s',closeSheet),
    btn('📊 Guardar','btn-p',()=>{_fe.height=hEl.value;_fe.leaves=lEl.value;_fe.note=noteEl.value;addEntry();})
  ));

  ov.appendChild(sb);return ov;
}

function buildSheetCheck(){
  const p=S.plants.find(x=>x.id===selId);
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov&&checkState!=='loading')closeSheet();}});
  const sb=el('div',{cls:'sb'});
  sb.appendChild(el('div',{cls:'shdr'},
    el('span',{cls:'sh'}),
    el('div',{cls:'st'},'Análisis IA'),
    p?el('div',{cls:'fs13 ci3',style:{marginTop:'4px'}},p.icon+' '+p.name):null
  ));

  if(checkState==='loading'){
    sb.appendChild(el('div',{cls:'empty',style:{padding:'50px 20px'}},
      el('div',{style:{fontSize:'48px',animation:'spin 2s linear infinite',display:'inline-block',marginBottom:'16px'}},'🔬'),
      el('div',{cls:'empty-t'},'Analizando el estado…'),
      el('div',{cls:'empty-s'},'La IA evalúa todos los datos de tu planta')
    ));
  }else if(checkState==='done'&&checkResult){
    const vi=VIT[checkResult.vitality]||VIT['bueno'];
    sb.appendChild(el('div',{cls:'check-hero',style:{background:vi.bg,border:'1.5px solid '+vi.dot+'40',marginBottom:'14px'}},
      el('div',{style:{marginBottom:'8px'}},vbadge(checkResult.vitality,true)),
      el('div',{cls:'check-headline fd',style:{color:vi.color}},checkResult.headline),
      el('div',{cls:'check-score fw8',style:{color:vi.dot}},checkResult.score,el('span',{style:{fontSize:'16px',fontWeight:'400',color:vi.color}},'/100')),
      el('div',{cls:'check-score-track'},el('div',{cls:'sbf',style:{width:checkResult.score+'%',background:vi.dot}}))
    ));
    sb.appendChild(el('div',{cls:'card'},el('div',{cls:'sl'},'Diagnóstico'),el('p',{cls:'fs14 ci2',style:{lineHeight:'1.7',margin:0}},checkResult.diagnosis)));
    if(checkResult.positives?.length>0){
      const pc=el('div',{cls:'card alert-g'});
      pc.appendChild(el('div',{cls:'sl sl-gr'},'✓ Puntos positivos'));
      checkResult.positives.forEach(p=>pc.appendChild(el('div',{cls:'ri'},el('span',{cls:'cgr fw7'},'✓'),el('span',{cls:'f1 fs13 ci2'},p))));
      sb.appendChild(pc);
    }
    if(checkResult.actions?.length>0){
      const ac=el('div',{cls:'card'},el('div',{cls:'sl'},'Acciones recomendadas'));
      checkResult.actions.forEach(a=>{
        const pcolor=a.priority==='alta'?'var(--rd)':a.priority==='media'?'var(--am)':'var(--gr)';
        const pbg=a.priority==='alta'?'#fef2f2':a.priority==='media'?'#fffbeb':'#f0faf4';
        ac.appendChild(el('div',{cls:'ri ac'},
          el('span',{cls:'fs10 fw8 fm upper',style:{padding:'3px 7px',borderRadius:'100px',background:pbg,color:pcolor,flexShrink:0}},a.priority),
          el('span',{cls:'f1 fs13 ci2',style:{lineHeight:'1.5'}},a.action)
        ));
      });
      sb.appendChild(ac);
    }
    sb.appendChild(el('div',{cls:'fs12 ci3 tc mb12'},'Próximo análisis en '+checkResult.nextCheckDays+' días'));
    sb.appendChild(btn('Entendido','btn-p btn-full',closeSheet));
  }else if(checkState==='error'){
    sb.appendChild(el('div',{cls:'empty'},
      el('div',{cls:'empty-em'},'❌'),
      el('div',{cls:'empty-t'},'Error en el análisis'),
      btn('Reintentar','btn-p',()=>p&&runCheck(p.id))
    ));
  }

  ov.appendChild(sb);return ov;
}
