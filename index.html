<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cr:#f7f4ef;--pa:#faf8f5;--wh:#fff;
  --i1:#1a1a18;--i2:#4a4a45;--i3:#9a9990;
  --gr:#2d6a4f;--gl:#52b788;--gx:#d8f3dc;
  --am:#d97706;--rd:#dc2626;--bl:#1d4ed8;
  --pu:#7c3aed;--pux:#f5f3ff;
  --bd:#e8e4dc;--sh:rgba(26,26,24,.07);
  --fd:'Fraunces',Georgia,serif;
  --fb:'DM Sans','Helvetica Neue',sans-serif;
  --fm:'DM Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--cr);font-family:var(--fb);color:var(--i1);overscroll-behavior:none;-webkit-overflow-scrolling:touch}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
.fd{font-family:var(--fd)}.fm{font-family:var(--fm)}
.fw7{font-weight:700}.fw8{font-weight:800}
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}.fs14{font-size:14px}.fs16{font-size:16px}
.ci1{color:var(--i1)}.ci2{color:var(--i2)}.ci3{color:var(--i3)}
.cgr{color:var(--gr)}.cam{color:var(--am)}.crd{color:var(--rd)}.cbl{color:var(--bl)}.cpu{color:var(--pu)}
.upper{text-transform:uppercase;letter-spacing:.08em}.italic{font-style:italic}
.page{padding:14px 16px calc(110px + var(--sab));animation:fadeIn .2s ease}
.hdr{background:rgba(250,248,245,.96);border-bottom:1px solid var(--bd);padding:calc(14px + var(--sat)) 18px 12px;position:sticky;top:0;z-index:30;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
.logo-sub{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.nav{display:flex;background:var(--cr);border-radius:14px;padding:3px;gap:2px}
.nb{flex:1;padding:9px 2px;border:none;border-radius:11px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--i3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--fb)}
.nb.on{font-weight:700;background:var(--wh);color:var(--i1);box-shadow:0 1px 6px var(--sh)}
.card{background:var(--wh);border-radius:20px;border:1px solid var(--bd);padding:18px;margin-bottom:10px;box-shadow:0 2px 14px var(--sh)}
.sl{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--i3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.sl-gr{color:var(--gr)}.sl-bl{color:var(--bl)}.sl-am{color:var(--am)}.sl-pu{color:var(--pu)}

/* Plant card */
.pc{background:var(--wh);border-radius:20px;border:1px solid var(--bd);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 14px var(--sh);display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s}
.pc:active{transform:scale(.98)}
.pc-line{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.pc-photo{width:56px;height:56px;border-radius:14px;object-fit:cover;flex-shrink:0;background:var(--cr)}
.pc-photo-em{width:56px;height:56px;border-radius:14px;background:var(--cr);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.pc-info{flex:1;min-width:0}
.pc-name{font-family:var(--fd);font-weight:700;font-size:16px;letter-spacing:-.01em;margin-bottom:3px}
.pc-sp{font-size:12px;color:var(--i3);font-style:italic;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Vitality badge */
.vb{display:inline-flex;align-items:center;gap:5px;border-radius:100px;padding:3px 9px;font-size:12px;font-weight:700}
.vb.lg{font-size:13px;padding:5px 13px}
.vb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vb.lg .vb-dot{width:8px;height:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:100px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s;gap:6px;font-family:var(--fb)}
.btn:active{transform:scale(.95)}
.btn-p{background:var(--gr);color:#fff;box-shadow:0 4px 14px rgba(45,106,79,.3)}
.btn-s{background:var(--wh);color:var(--i1);border:1.5px solid var(--bd)}
.btn-w{background:#fef2f2;color:var(--rd);border:1.5px solid #fecaca}
.btn-g{background:transparent;color:var(--i3);border:none;padding:6px 10px}
.btn-bl{background:#dbeafe;color:var(--bl);border:none}
.btn-pu{background:var(--pux);color:var(--pu);border:none}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-full{width:100%}
.fab{position:fixed;bottom:calc(76px + var(--sab));right:20px;width:56px;height:56px;border-radius:50%;background:var(--gr);border:none;cursor:pointer;font-size:24px;color:#fff;box-shadow:0 6px 24px rgba(45,106,79,.4);z-index:25;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.fab:active{transform:scale(.9)}
.safe-bottom{position:fixed;bottom:0;left:0;right:0;height:calc(66px + var(--sab));background:var(--pa);border-top:1px solid var(--bd);max-width:430px;margin:0 auto;z-index:28}

/* Forms */
.fg{margin-bottom:14px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
label{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--i3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;background:var(--pa);border:1.5px solid var(--bd);border-radius:12px;padding:11px 13px;color:var(--i1);outline:none;font-family:var(--fb);font-size:16px;transition:border-color .15s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gr)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{padding:11px;border:1.5px solid var(--bd);border-radius:12px;background:var(--pa);cursor:pointer;font-weight:600;font-size:14px;font-family:var(--fb);transition:all .15s;text-align:center}
.tbtn.on{border-color:var(--gr);background:var(--gx);color:var(--gr)}
.eg{display:flex;gap:6px;flex-wrap:wrap}
.eb{font-size:22px;width:42px;height:42px;background:var(--cr);border:1.5px solid var(--bd);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eb.on{border-color:var(--gr);background:var(--gx)}

/* Sheet */
.ov{position:fixed;inset:0;background:rgba(26,26,24,.45);z-index:50;display:flex;align-items:flex-end;animation:fadeIn .15s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sb{background:var(--pa);border-radius:28px 28px 0 0;padding:0 20px calc(40px + var(--sab));width:100%;max-width:430px;margin:0 auto;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(26,26,24,.15);animation:slideUp .25s ease;-webkit-overflow-scrolling:touch}
.sh{width:40px;height:4px;background:var(--bd);border-radius:4px;margin:14px auto 20px;display:block}
.shdr{position:sticky;top:0;background:var(--pa);padding:4px 0 16px;z-index:2}
.st{font-family:var(--fd);font-size:22px;font-weight:800}

/* Toast */
.toast{position:fixed;top:max(20px,var(--sat));left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:13px;z-index:200;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:slideUp .2s ease;pointer-events:none}
.toast-w{background:var(--rd)}.toast-i{background:var(--bl)}

/* Alerts */
.alert{border-radius:18px;padding:14px 16px;margin-bottom:10px}
.alert-y{background:#fffbeb;border:1.5px solid #fde68a}
.alert-b{background:#eff6ff;border:1.5px solid #bfdbfe}
.alert-g{background:#f0faf4;border:1.5px solid var(--gx)}
.alert-pu{background:var(--pux);border:1.5px solid #e9d5ff}
.ar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ar:last-child{margin-bottom:0}

/* Info cells */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:var(--cr);border-radius:12px;padding:11px}
.ic-l{font-family:var(--fm);font-size:10px;color:var(--i3);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.ic-v{font-size:13px;font-weight:600}

/* Stats */
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sb2{background:var(--wh);border-radius:16px;border:1px solid var(--bd);padding:14px;text-align:center;box-shadow:0 2px 8px var(--sh)}
.sn{font-family:var(--fd);font-size:24px;font-weight:800;line-height:1}

/* Hero */
.hero{position:relative;overflow:hidden}
.hero-bg{position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;opacity:.5}
.hero-photo{width:80px;height:80px;border-radius:18px;object-fit:cover;flex-shrink:0;border:2px solid var(--bd)}
.hero-photo-em{width:80px;height:80px;border-radius:18px;background:var(--cr);display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0}

/* Tabs */
.tabs{display:flex;background:var(--cr);border-radius:14px;padding:4px;gap:2px;margin-bottom:14px}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:var(--i3);transition:all .15s;font-family:var(--fb)}
.tab.on{font-weight:700;background:var(--wh);color:var(--i1);box-shadow:0 1px 4px var(--sh)}
.ri{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.ri:last-child{border-bottom:none}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pt{flex:1;height:6px;background:var(--cr);border-radius:6px;overflow:hidden}
.pf{height:100%;border-radius:6px}
.pill{display:inline-block;background:var(--gx);color:var(--gr);border-radius:100px;padding:3px 10px;font-size:12px;font-weight:600;margin:0 4px 4px 0}
.quote{font-size:13px;color:var(--i3);font-style:italic;border-left:3px solid var(--gl);padding-left:12px;margin-top:10px}
.sbt{height:6px;background:var(--cr);border-radius:10px;overflow:hidden;margin-top:4px}
.sbf{height:100%;border-radius:10px;transition:width .6s}

/* Map */
#leaflet-map{width:100%;height:260px;border-radius:14px;overflow:hidden;z-index:1}
.map-card{position:relative}
.wx-card{background:linear-gradient(135deg,#e8f5e9,#f0faf4);border-radius:20px;border:1px solid #c8e6c9;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 14px var(--sh)}

/* AI wizard */
.wiz-step{animation:fadeIn .2s ease}
.wiz-q{font-family:var(--fd);font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.wiz-sub{font-size:14px;color:var(--i3);margin-bottom:20px;line-height:1.5}
.wiz-opts{display:flex;flex-direction:column;gap:8px}
.wiz-opt{background:var(--wh);border:1.5px solid var(--bd);border-radius:14px;padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;text-align:left;font-family:var(--fb);display:flex;align-items:center;gap:10px}
.wiz-opt:active,.wiz-opt.on{border-color:var(--gr);background:var(--gx);color:var(--gr);font-weight:700}
.wiz-opt-em{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.wiz-progress{display:flex;gap:4px;margin-bottom:24px}
.wiz-dot{flex:1;height:4px;border-radius:2px;background:var(--bd);transition:background .3s}
.wiz-dot.on{background:var(--gr)}
.wiz-loading{text-align:center;padding:40px 20px}
.wiz-loading-em{font-size:52px;animation:spin 2s linear infinite;display:inline-block;margin-bottom:16px}
.wiz-result{background:var(--gx);border-radius:16px;padding:16px;margin-bottom:14px}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px - var(--sat) - var(--sab));min-height:300px}
.chat-msgs{flex:1;overflow-y:auto;padding:4px 0 12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat-bubble{max-width:85%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.55;animation:slideUp .2s ease}
.chat-bubble.ai{background:var(--wh);border:1px solid var(--bd);border-radius:4px 18px 18px 18px;align-self:flex-start;color:var(--i1)}
.chat-bubble.user{background:var(--gr);color:#fff;border-radius:18px 18px 4px 18px;align-self:flex-end}
.chat-bubble.thinking{background:var(--cr);color:var(--i3);font-style:italic;align-self:flex-start}
.chat-input-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--bd)}
.chat-input{flex:1;background:var(--wh);border:1.5px solid var(--bd);border-radius:20px;padding:11px 16px;font-family:var(--fb);font-size:15px;color:var(--i1);outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
.chat-input:focus{border-color:var(--gr)}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--gr);border:none;cursor:pointer;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
.chat-send:active{transform:scale(.9)}
.chat-suggestions{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 2px}
.chat-sug{background:var(--cr);border:1px solid var(--bd);border-radius:100px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb);color:var(--i2);transition:all .15s;white-space:nowrap}
.chat-sug:active{background:var(--gx);color:var(--gr)}

/* Photo upload */
.photo-preview{width:100%;height:160px;object-fit:cover;border-radius:14px;display:block;margin-bottom:10px}
.photo-placeholder{width:100%;height:120px;background:var(--cr);border-radius:14px;border:2px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:10px;transition:all .15s}
.photo-placeholder:active{background:var(--gx);border-color:var(--gl)}

/* AI box */
.ai-box{background:linear-gradient(135deg,#f5f3ff,#faf8ff);border:1.5px solid #e9d5ff;border-radius:16px;padding:16px;margin-bottom:20px}
.ai-r{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
.spark{width:100%;height:44px;overflow:visible}

/* Misc */
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.ac{align-items:center}.jb{justify-content:space-between}.f1{flex:1}
.tc{text-align:center}.tr{text-align:right}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.empty{text-align:center;padding:40px 20px}
.empty-em{font-size:52px;margin-bottom:14px}
.empty-t{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:8px}
.empty-s{font-size:14px;color:var(--i3);margin-bottom:20px}
select option{background:var(--pa);color:var(--i1)}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

<div id="app"></div>
<script>
'use strict';
// ═══════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════
const SK='plantai_v5';
const WDAYS={'Cada día':1,'Cada 2 días':2,'2× semana':3,'1× semana':7,'Cada 2 semanas':14,'Mensual':30};
const VIT={
  'óptimo':  {label:'Óptimo',  color:'#2d6a4f',bg:'#d8f3dc',dot:'#52b788'},
  'bueno':   {label:'Bueno',   color:'#386641',bg:'#e9f5db',dot:'#6a994e'},
  'atención':{label:'Atención',color:'#bc6c25',bg:'#fef3c7',dot:'#f59e0b'},
  'crítico': {label:'Crítico', color:'#9b2226',bg:'#fee2e2',dot:'#ef4444'},
};
const EMOJIS=['🌿','🌱','🌵','🌸','🍀','🌴','🌾','🍃','🌺','🪴','🌻','🍅','🌳','🎋','🪷','🌼','🫧','🪸'];
const LIGHTS=['Pleno sol','Sol directo','Indirecta brillante','Indirecta','Semi-sombra','Sombra'];
const WATERS=Object.keys(WDAYS);
const FERTS=['Semanal','Quincenal','Mensual','Cada 2 meses','Estacional','Nunca'];

function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='cls')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='for')e.htmlFor=v;
    else if(k[0]==='$')e.addEventListener(k.slice(1),v);
    else if(k==='val')e.value=v;
    else e.setAttribute(k,v);
  }
  for(const c of ch.flat()){
    if(c==null||c===false||c===undefined)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  }
  return e;
}
function svgEl(tag,attrs,...ch){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);for(const c of ch.flat())if(c)e.appendChild(c);return e;}
function div(cls,...ch){return el('div',{cls},...ch);}
function btn(label,cls,cb,extra={}){return el('button',{cls:'btn '+cls,$click:cb,...extra},label);}

const getKey=()=>S.settings.apiKey||'';
async function compressImage(file,maxW=512){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1,maxW/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.6).split(',')[1]);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);fileToB64(file).then(res);};
    img.src=url;
  });
}

// IA via OpenRouter - gratis, soporta vision, sin limites raros de Gemini
async function callOpenRouter(messages){
  const key=getKey();
  if(!key)throw new Error('NO_KEY');
  let r;
  try{
    r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+key,
        'HTTP-Referer':'https://plant.ai',
        'X-Title':'plant.ai'
      },
      body:JSON.stringify({
        model:'openrouter/free',
        messages:messages,
        max_tokens:1500
      })
    });
  }catch(e){throw new Error('Sin conexion a internet');}
  const j=await r.json();
  if(j.error){
    const msg=(j.error.message||'').toLowerCase();
    if(msg.includes('quota')||msg.includes('rate limit')||msg.includes('limit')){
      throw new Error('QUOTA');
    }
    if(r.status===401||msg.includes('auth')||msg.includes('invalid api key')){
      throw new Error('KEY');
    }
    throw new Error(j.error.message||'Error de IA');
  }
  const text=j.choices?.[0]?.message?.content||'';
  if(!text)throw new Error('Sin respuesta de la IA');
  return text.replace(/```json|```/g,'').trim();
}

// Wrapper compatibles con el codigo existente que usaba partes de Gemini
async function gemini(parts,temperature=0.2){
  const msgs=[{role:'user',content:[]}];
  for(const p of parts){
    if(p.text)msgs[0].content.push({type:'text',text:p.text});
    else if(p.inline_data)msgs[0].content.push({type:'image_url',image_url:{url:'data:'+p.inline_data.mime_type+';base64,'+p.inline_data.data}});
  }
  // Si solo hay texto, enviar como string simple (mas compatible)
  if(msgs[0].content.length===1&&msgs[0].content[0].type==='text'){
    msgs[0].content=msgs[0].content[0].text;
  }
  return await callOpenRouter(msgs);
}

async function geminiJSON(parts){
  const txt=await gemini(parts);
  try{return JSON.parse(txt);}
  catch{
    const m=txt.match(/\{[\s\S]*\}/);
    if(m)try{return JSON.parse(m[0]);}catch{}
    throw new Error('Respuesta no valida');
  }
}

function fetchWeather(){
  wxState='loading';render();
  if(!navigator.geolocation){wxState='error';render();return;}
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:lat,longitude:lon}=pos.coords;
    try{
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weathercode,windspeed_10m,precipitation&daily=precipitation_sum&timezone=auto&forecast_days=1`);
      const j=await r.json();
      let city='Tu ubicación';
      try{const g=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);const gj=await g.json();city=gj.address?.city||gj.address?.town||gj.address?.village||gj.address?.municipality||city;}catch{}
      const rain=j.daily?.precipitation_sum?.[0]??j.current?.precipitation??0;
      weather={temp:Math.round(j.current.temperature_2m),code:j.current.weathercode,humidity:j.current.relative_humidity_2m,wind:Math.round(j.current.windspeed_10m),rain,city,lat,lon};
      if(!S.settings.homeLocation){S.settings.homeLocation={lat,lon,city};saveS();}
      const thresh=S.settings.rainMm||8;
      if(rain>=thresh){
        S.plants=S.plants.map(p=>{if(!p.outdoor)return p;const days=WDAYS[p.watering]||7;const nxt=new Date();nxt.setDate(nxt.getDate()+days);return{...p,lastWatered:td(),nextWatering:nxt.toISOString().split('T')[0]};});
        saveS();toast(`🌧️ ${rain}mm — plantas exteriores regadas`,'i');
      }
      wxState='ok';
    }catch{wxState='error';}
    render();
  },()=>{wxState='error';render();});
}

  chatLoading=false;saveS();render();

function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}

// ═══════════════════════════════════
// SPARKLINE
// ═══════════════════════════════════
function sparkline(entries){
  if(!entries||entries.length<2)return null;
  const W=280,H=50,hs=entries.map(e=>e.height||0);
  const mx=Math.max(...hs),mn=Math.min(...hs),rng=mx-mn||1;
  const pts=entries.map((e,i)=>[(i/(entries.length-1))*(W-8)+4,H-4-((e.height-mn)/rng)*(H-10)]);
  const d=pts.map(([x,y],i)=>`${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'spark'});
  svg.appendChild(svgEl('polygon',{points:`${pts.map(([x,y])=>`${x},${y}`).join(' ')} ${pts[pts.length-1][0]},${H} ${pts[0][0]},${H}`,fill:'rgba(45,106,79,.08)'}));
  svg.appendChild(svgEl('path',{d,fill:'none',stroke:'#2d6a4f','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'}));
  pts.forEach(([x,y],i)=>svg.appendChild(svgEl('circle',{cx:x,cy:y,r:i===pts.length-1?'4':'3',fill:i===pts.length-1?'#2d6a4f':'#fff',stroke:'#2d6a4f','stroke-width':'2'})));
  return svg;
}

  const gear=el('button',{style:{position:'fixed',bottom:'calc(76px + var(--sab))',left:'20px',width:'44px',height:'44px',borderRadius:'50%',background:'var(--wh)',border:'1px solid var(--bd)',cursor:'pointer',fontSize:'18px',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px var(--sh)',zIndex:25},$click:()=>{page='settings';render();}},'⚙️');
  if(page==='settings'||page==='map'||page==='chat'){const wrap=document.createDocumentFragment();wrap.appendChild(gear);return wrap;}
  if(page==='detail'){const wrap=document.createDocumentFragment();wrap.appendChild(gear);wrap.appendChild(el('button',{cls:'fab',style:{fontSize:'22px'},$click:()=>{_fe=BE();activeSheet='entry';render();}},'📊'));return wrap;}

// ═══════════════════════════════════
// SHEET: ADD PLANT (WIZARD)
// ═══════════════════════════════════
function buildSheetPlant(){
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov&&!wizLoading)closeSheet();}});
  const sb=el('div',{cls:'sb'});

  // WIZARD MODE: steps 0-4 are questions, step 5 is manual form
  const totalSteps=WIZ_QUESTIONS.length;
  const inWizard=wizStep<totalSteps&&!wizResult&&!wizLoading;
  const showForm=wizStep>=totalSteps||wizResult;

  if(wizLoading){
    sb.appendChild(el('span',{cls:'sh'}));
    sb.appendChild(el('div',{cls:'wiz-loading'},
      el('div',{cls:'wiz-loading-em'},'🌿'),
      el('div',{cls:'empty-t'},'Analizando tu situación…'),
      el('div',{cls:'empty-s'},'La IA está creando una guía de cuidados personalizada para ti')
    ));
    ov.appendChild(sb);return ov;
  }

  sb.appendChild(el('div',{cls:'shdr'},
    el('span',{cls:'sh'}),
    el('div',{cls:'flex jb ac'},
      el('div',{cls:'st'},wizResult?'Guía lista ✅':inWizard?'Nueva planta':'Nueva planta'),
      btn('×','btn-g',closeSheet,{style:{fontSize:'22px',padding:'4px 8px',color:'var(--i3)'}})
    )
  ));

  if(inWizard){
    // Progress dots
    const prog=el('div',{cls:'wiz-progress'});
    for(let i=0;i<totalSteps;i++)prog.appendChild(el('div',{cls:'wiz-dot'+(i<=wizStep?' on':'')}));
    sb.appendChild(prog);

    const q=WIZ_QUESTIONS[wizStep];
    sb.appendChild(el('div',{cls:'wiz-step'},
      el('div',{cls:'wiz-q'},q.q),
      el('div',{cls:'wiz-sub'},q.sub),
      el('div',{cls:'wiz-opts'},...q.opts.map(o=>
        el('button',{cls:'wiz-opt'+(wizAnswers[q.key]===o.val?' on':''),$click:()=>{
          wizAnswers[q.key]=o.val;
          if(wizStep<totalSteps-1){wizStep++;render();}
          else{
            // Last question — ask for plant name then run wizard
            wizStep=totalSteps;render();
          }
        }},el('span',{cls:'wiz-opt-em'},o.em),o.label)
      ))
    ));

    if(wizStep>0)sb.appendChild(el('button',{cls:'btn btn-g btn-full mt12 fs13 ci3',$click:()=>{wizStep--;render();}},'← Anterior'));
    sb.appendChild(el('button',{cls:'btn btn-g btn-full mt4 fs12 ci3',$click:()=>{wizStep=totalSteps;render();}},'Saltar y rellenar manualmente'));
  }

  if(showForm&&!wizResult){
    // Plant name + photo before running wizard
    sb.appendChild(el('div',{cls:'mb12'},
      el('div',{cls:'st mb8'},'¿Cómo se llama tu planta?'),
      el('div',{cls:'fs13 ci3 mb16'},'Puedes hacer una foto para que la IA la identifique automáticamente.')
    ));

    // Photo
    const photoArea=el('div',{});
    if(_fp.photo){
      photoArea.appendChild(el('img',{cls:'photo-preview',src:_fp.photo}));
      photoArea.appendChild(btn('Cambiar foto','btn-s btn-full mb10',()=>{_fp.photo=null;wizPhotoB64=null;render();}));
    } else {
      const ph=el('div',{cls:'photo-placeholder'});
      ph.appendChild(el('span',{style:{fontSize:'36px'}},'📷'));
      ph.appendChild(el('span',{cls:'fs13 ci3'},'Toca para hacer una foto'));
      const fi=el('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
      fi.addEventListener('change',e=>{const f=e.target.files?.[0];if(f){handlePlantPhoto(f);identifyPlant(f);}});
      ph.addEventListener('click',()=>fi.click());
      ph.appendChild(fi);
      photoArea.appendChild(ph);
    }
    sb.appendChild(photoArea);

    if(aiState==='loading')sb.appendChild(el('div',{cls:'fs13',style:{color:'var(--pu)',marginBottom:'10px',textAlign:'center'}},'🔍 Identificando planta…'));
    if(aiState==='done'&&aiIdent)sb.appendChild(el('div',{cls:'card alert-g mb12'},el('div',{cls:'fw7 fs14 mb4'},aiIdent.icon+' '+aiIdent.commonName),el('div',{cls:'fs12 ci3'},aiIdent.scientificName),el('div',{cls:'fs11 fw7 cgr mt8 fm'},'✓ DATOS RELLENADOS')));

    sb.appendChild(el('div',{cls:'fg'},el('label',{},'Nombre *'),el('input',{type:'text',placeholder:'Ej: Mi Monstera',val:_fp.name,$input:e=>_fp.name=e.target.value})));

    const locEl=el('input',{type:'text',placeholder:'Salón, habitación, balcón…',val:_fp.location||'',$input:e=>_fp.location=e.target.value});
    sb.appendChild(el('div',{cls:'fg'},el('label',{},'¿Dónde va a estar?'),locEl));

    if(getKey()&&_fp.name){
      sb.appendChild(btn('🤖 Generar guía de cuidados con IA','btn-pu btn-full mb8',()=>{
        if(!_fp.name.trim()){toast('Escribe el nombre primero','w');return;}
        // apply wizard location answer
        if(wizAnswers.location){const loc={interior:'Interior',ventana:'Junto a ventana',balcon:'Balcón',jardin:'Jardín'}[wizAnswers.location];if(loc&&!_fp.location)_fp.location=loc;}
        _fp.outdoor=wizAnswers.location==='balcon'||wizAnswers.location==='jardin';
        runWizard();
      }));
    }
    sb.appendChild(btn('Añadir sin guía IA','btn-s btn-full',()=>{if(!_fp.name.trim()){toast('El nombre es obligatorio','w');return;}if(wizAnswers.location){const loc={interior:'Interior',ventana:'Junto a ventana',balcon:'Balcón',jardin:'Jardín'}[wizAnswers.location];if(loc&&!_fp.location)_fp.location=loc;}_fp.outdoor=wizAnswers.location==='balcon'||wizAnswers.location==='jardin';addPlant();}));
  }

  if(wizResult){
    const vi=VIT['óptimo'];
    sb.appendChild(el('div',{cls:'wiz-result'},
      el('div',{cls:'fw8 fs14 fd mb4 cgr'},'✅ Guía personalizada generada'),
      el('div',{cls:'fs13 ci2',style:{lineHeight:'1.6'}},wizResult.summary||'')
    ));
    sb.appendChild(el('div',{cls:'ig mb12'},
      el('div',{cls:'ic'},el('div',{cls:'ic-l'},'💧 Riego'),el('div',{cls:'ic-v'},wizResult.wateringFrequency||'—')),
      el('div',{cls:'ic'},el('div',{cls:'ic-l'},'🌿 Dificultad'),el('div',{cls:'ic-v'},wizResult.difficulty||'—')),
      el('div',{cls:'ic'},el('div',{cls:'ic-l'},'🌍 Sustrato'),el('div',{cls:'ic-v fs12'},wizResult.substrate||'—')),
      el('div',{cls:'ic'},el('div',{cls:'ic-l'},'🪴 Maceta'),el('div',{cls:'ic-v'},wizResult.potSize||'—'))
    ));
    if(wizResult.wateringTip)sb.appendChild(el('div',{cls:'card mb8'},el('div',{cls:'sl'},'💧 Cómo regar'),el('div',{cls:'fs13 ci2',style:{lineHeight:'1.6'}},wizResult.wateringTip)));
    if(wizResult.transplantTip)sb.appendChild(el('div',{cls:'card alert-y mb8'},el('div',{cls:'sl sl-am'},'🪴 Trasplante'),el('div',{cls:'fs13 ci2',style:{lineHeight:'1.6'}},wizResult.transplantTip)));
    if(wizResult.beginnerTips?.length>0){
      const bt=el('div',{cls:'card alert-pu mb12'},el('div',{cls:'sl sl-pu'},'💡 Consejos clave'));
      wizResult.beginnerTips.forEach((t,i)=>bt.appendChild(el('div',{cls:'ri'},el('span',{cls:'fw7 fs12 cpu',style:{minWidth:'20px'}},i+1+'.'),el('span',{cls:'f1 fs13 ci2'},t))));
      sb.appendChild(bt);
    }
    sb.appendChild(btn('🌱 Añadir esta planta','btn-p btn-full',()=>{addPlant();}));
    sb.appendChild(btn('← Volver atrás','btn-g btn-full mt4 fs13',()=>{wizResult=null;render();}));
  }

  ov.appendChild(sb);return ov;
}

  const dateEl=el('input',{type:'date',val:_fe.date});dateEl.addEventListener('change',e=>_fe.date=e.target.value);

  if(_fe.photoUrl)sb.appendChild(el('img',{src:_fe.photoUrl,style:{width:'100%',height:'140px',objectFit:'cover',borderRadius:'12px',marginBottom:'10px'}}));
  sb.appendChild(fotoLbl);

  sb.appendChild(el('div',{cls:'fg2',style:{gridTemplateColumns:'1fr 2fr'}},btn('Cancelar','btn-s',closeSheet),btn('📊 Guardar','btn-p',()=>{_fe.height=hEl.value;_fe.leaves=lEl.value;_fe.note=noteEl.value;addEntry();})));
  ov.appendChild(sb);return ov;
}

// SHEET: CHECK RESULT

function buildSheetCheck(){
  const p=S.plants.find(x=>x.id===selId);
  const ov=el('div',{cls:'ov',$click:e=>{if(e.target===ov&&checkState!=='loading')closeSheet();}});
  const sb=el('div',{cls:'sb'});
  sb.appendChild(el('div',{cls:'shdr'},el('span',{cls:'sh'}),el('div',{cls:'flex jb ac'},el('div',{cls:'st'},'Análisis IA'),checkState!=='loading'?el('button',{cls:'btn btn-g',style:{fontSize:'20px',padding:'4px 8px',color:'var(--i3)'},$click:closeSheet},'×'):null),p?el('div',{cls:'fs13 ci3',style:{marginTop:'4px'}},p.icon+' '+p.name):null));
  if(checkState==='idle'){
    // Show photo option first
    sb.appendChild(el('div',{cls:'tc',style:{padding:'10px 0 20px'}},
      el('div',{style:{fontSize:'48px',marginBottom:'12px'}},'📸'),
      el('div',{cls:'fw7 fs16 mb8'},'¿Quieres hacer una foto?'),
      el('div',{cls:'fs13 ci3 mb20',style:{lineHeight:'1.6'}},'La IA puede ver el estado visual de la planta para un análisis más preciso.'),
      el('label',{cls:'btn btn-p btn-full mb10',style:{cursor:'pointer',justifyContent:'center'}},
        '📷 Hacer foto y analizar',
        el('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'},
          $change:async e=>{
            const f=e.target.files?.[0];
            if(!f)return;
            checkState='loading';render();
            const b64=await compressImage(f);
            runCheck(selId,b64);
          }
        })
      ),
      btn('Analizar sin foto','btn-s btn-full',()=>runCheck(selId,null))
    ));
  } else if(checkState==='loading'){sb.appendChild(el('div',{cls:'wiz-loading'},el('div',{cls:'wiz-loading-em'},'🔬'),el('div',{cls:'empty-t'},'Analizando el estado…'),el('div',{cls:'empty-s'},'La IA evalúa todos los datos de tu planta')));}
  else if(checkState==='done'&&checkResult){
    const vi=VIT[checkResult.vitality]||VIT['bueno'];
    sb.appendChild(el('div',{style:{background:vi.bg,border:'1.5px solid '+vi.dot+'40',borderRadius:'18px',padding:'20px',marginBottom:'14px',textAlign:'center'}},
      el('div',{style:{marginBottom:'8px'}},vbadge(checkResult.vitality,true)),
      el('div',{style:{fontFamily:'var(--fd)',fontSize:'20px',fontWeight:'800',color:vi.color,margin:'8px 0'}},checkResult.headline),
      el('div',{style:{fontSize:'36px',fontWeight:'900',color:vi.dot}},checkResult.score,el('span',{style:{fontSize:'16px',fontWeight:'400',color:vi.color}},'/100')),
      el('div',{cls:'sbt mt12'},el('div',{cls:'sbf',style:{width:checkResult.score+'%',background:vi.dot}}))
    ));
    sb.appendChild(el('div',{cls:'card'},el('div',{cls:'sl'},'Diagnóstico'),el('p',{cls:'fs14 ci2',style:{lineHeight:'1.7',margin:0}},checkResult.diagnosis)));
    if(checkResult.transplantNeeded)sb.appendChild(el('div',{cls:'card alert-y'},el('div',{cls:'sl sl-am'},'🪴 Trasplante recomendado'),el('div',{cls:'fs13 ci2',style:{lineHeight:'1.6'}},checkResult.transplantReason||'')));
    if(checkResult.positives?.length>0){const pc=el('div',{cls:'card alert-g'});pc.appendChild(el('div',{cls:'sl sl-gr'},'✓ Puntos positivos'));checkResult.positives.forEach(p=>pc.appendChild(el('div',{cls:'ri'},el('span',{cls:'cgr fw7'},'✓'),el('span',{cls:'f1 fs13 ci2'},p))));sb.appendChild(pc);}
    if(checkResult.actions?.length>0){
      const ac=el('div',{cls:'card'},el('div',{cls:'sl'},'Acciones recomendadas'));
      checkResult.actions.forEach(a=>{const pcolor=a.priority==='alta'?'var(--rd)':a.priority==='media'?'var(--am)':'var(--gr)';const pbg=a.priority==='alta'?'#fef2f2':a.priority==='media'?'#fffbeb':'#f0faf4';ac.appendChild(el('div',{cls:'ri ac'},el('span',{cls:'fs10 fw8 fm upper',style:{padding:'3px 7px',borderRadius:'100px',background:pbg,color:pcolor,flexShrink:0}},a.priority),el('span',{cls:'f1 fs13 ci2',style:{lineHeight:'1.5'}},a.action)));});sb.appendChild(ac);
    }
    sb.appendChild(el('div',{cls:'fs12 ci3 tc mb12'},'Próximo análisis en '+checkResult.nextCheckDays+' días · cada '+checkResult.nextCheckDays+' días'));
    sb.appendChild(btn('Entendido','btn-p btn-full',closeSheet));
  } else if(checkState==='error'){sb.appendChild(el('div',{cls:'empty'},el('div',{cls:'empty-em'},'❌'),el('div',{cls:'empty-t'},'Error en el análisis'),btn('Reintentar','btn-p',()=>{checkState='idle';render();})));}
  ov.appendChild(sb);return ov;
}

  render();
  setTimeout(fetchWeather,600);
  if('serviceWorker' in navigator){
    const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{if(e.request.mode==='navigate'){e.respondWith(fetch(e.request).catch(()=>new Response('',{status:200})));}});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }
});
